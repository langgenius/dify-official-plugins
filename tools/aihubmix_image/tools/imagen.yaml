identity:
  name: "imagen"
  author: "langgenius"
  label:
    en_US: "Google Imagen 4"
    zh_Hans: "Google Imagen 4"
    pt_BR: "Google Imagen 4"
    ja_JP: "Google Imagen 4"
description:
  human:
    en_US: "Google Imagen 4 text-to-image. Ultra prioritizes quality, the standard 4.0 is balanced, Fast trades quality for speed, and the 06-06 Preview is the latest preview build."
    zh_Hans: "Google Imagen 4 文生图。Ultra 主打最高质量，4.0 标准版均衡，Fast 偏速度，Preview 06-06 为最新预览版本。"
    pt_BR: "Texto-para-imagem do Google Imagen 4. Ultra prioriza qualidade, 4.0 padrão é equilibrado, Fast prioriza velocidade e o Preview 06-06 é a build de prévia mais recente."
    ja_JP: "Google Imagen 4 のテキストから画像生成。Ultra は最高品質、4.0 標準版はバランス型、Fast は速度重視、Preview 06-06 は最新プレビュー版。"
  llm: "Generate images with Google Imagen 4 (Ultra / 4.0 / Fast / Fast Preview 06-06). Strong on photorealism and prompt fidelity, with up to 4 images per call and standard aspect ratios."
parameters:
  - name: prompt
    type: string
    required: true
    label:
      en_US: "Prompt"
      zh_Hans: "提示词"
      pt_BR: "Prompt"
      ja_JP: "プロンプト"
    human_description:
      en_US: "Text description of image you want to generate"
      zh_Hans: "您想要生成的图像的文字描述"
      pt_BR: "Descrição textual da imagem que você deseja gerar"
      ja_JP: "生成したい画像のテキスト説明"
    llm_description: "Text prompt for Google Imagen image generation, describing the desired image content"
    form: llm
  
  - name: model
    type: select
    required: false
    label:
      en_US: "Imagen Model"
      zh_Hans: "Imagen 模型"
      pt_BR: "Modelo Imagen"
      ja_JP: "Imagenモデル"
    human_description:
      en_US: "Choose Google Imagen model variant"
      zh_Hans: "选择 Google Imagen 模型变体"
      pt_BR: "Escolha a variante do modelo Google Imagen"
      ja_JP: "Google Imagenモデルのバリアントを選択"
    llm_description: "Google Imagen model selection. Different variants offer different quality and speed trade-offs"
    form: form
    default: "imagen-4.0-fast-generate-001"
    options:
      - value: "imagen-4.0-ultra-generate-001"
        label:
          en_US: "Imagen 4.0 Ultra (Highest Quality)"
          zh_Hans: "Imagen 4.0 Ultra（最高质量）"
          pt_BR: "Imagen 4.0 Ultra (Qualidade Máxima)"
          ja_JP: "Imagen 4.0 Ultra（最高品質）"
      - value: "imagen-4.0-generate-001"
        label:
          en_US: "Imagen 4.0 (High Quality)"
          zh_Hans: "Imagen 4.0（高质量）"
          pt_BR: "Imagen 4.0 (Alta Qualidade)"
          ja_JP: "Imagen 4.0（高品質）"
      - value: "imagen-4.0-fast-generate-001"
        label:
          en_US: "Imagen 4.0 Fast (Balanced)"
          zh_Hans: "Imagen 4.0 Fast（平衡）"
          pt_BR: "Imagen 4.0 Fast (Equilibrado)"
          ja_JP: "Imagen 4.0 Fast（バランス）"
      - value: "imagen-4.0-fast-generate-preview-06-06"
        label:
          en_US: "Imagen 4.0 Fast Preview 06-06"
          zh_Hans: "Imagen 4.0 Fast 预览版 06-06"
          pt_BR: "Imagen 4.0 Fast Preview 06-06"
          ja_JP: "Imagen 4.0 Fast プレビュー 06-06"
  
  - name: num_images
    type: number
    required: false
    label:
      en_US: "Number of Images"
      zh_Hans: "生成数量"
      pt_BR: "Número de Imagens"
      ja_JP: "画像数"
    human_description:
      en_US: "Number of images to generate (1-4)"
      zh_Hans: "生成图像的数量 (1-4)"
      pt_BR: "Número de imagens para gerar (1-4)"
      ja_JP: "生成する画像の数 (1-4)"
    llm_description: "Number of Google Imagen images to generate. Range: 1-4"
    form: form
    default: 1
    min: 1
    max: 4
  
  - name: aspect_ratio
    type: select
    required: false
    label:
      en_US: "Aspect Ratio"
      zh_Hans: "宽高比"
      pt_BR: "Proporção"
      ja_JP: "アスペクト比"
    human_description:
      en_US: "Image aspect ratio"
      zh_Hans: "图像宽高比"
      pt_BR: "Proporção da imagem"
      ja_JP: "画像のアスペクト比"
    llm_description: "Output image aspect ratio for Google Imagen generation"
    form: form
    default: "1:1"
    options:
      - value: "1:1"
        label:
          en_US: "1:1 (Square)"
          zh_Hans: "1:1 (正方形)"
          pt_BR: "1:1 (Quadrado)"
          ja_JP: "1:1 (正方形)"
      - value: "4:3"
        label:
          en_US: "4:3 (Landscape)"
          zh_Hans: "4:3 (横向)"
          pt_BR: "4:3 (Paisagem)"
          ja_JP: "4:3 (横向)"
      - value: "3:4"
        label:
          en_US: "3:4 (Portrait)"
          zh_Hans: "3:4 (纵向)"
          pt_BR: "3:4 (Retrato)"
          ja_JP: "3:4 (纵向)"
      - value: "16:9"
        label:
          en_US: "16:9 (Widescreen)"
          zh_Hans: "16:9 (宽屏)"
          pt_BR: "16:9 (Widescreen)"
          ja_JP: "16:9 (ワイドスクリーン)"
      - value: "9:16"
        label:
          en_US: "9:16 (Vertical)"
          zh_Hans: "9:16 (竖屏)"
          pt_BR: "9:16 (Vertical)"
          ja_JP: "9:16 (縦長)"

  - name: image_format
    type: select
    required: false
    label:
      en_US: "Image Format"
      zh_Hans: "图片格式"
      pt_BR: "Formato de Imagem"
      ja_JP: "画像フォーマット"
    human_description:
      en_US: "Output image format"
      zh_Hans: "输出图片格式"
      pt_BR: "Formato de saída da imagem"
      ja_JP: "出力画像フォーマット"
    llm_description: "Image format for Google Imagen generation"
    form: form
    default: "png"
    options:
      - value: "png"
        label:
          en_US: "PNG"
          zh_Hans: "PNG"
          pt_BR: "PNG"
          ja_JP: "PNG"
      - value: "jpeg"
        label:
          en_US: "JPEG"
          zh_Hans: "JPEG"
          pt_BR: "JPEG"
          ja_JP: "JPEG"
      - value: "webp"
        label:
          en_US: "WebP"
          zh_Hans: "WebP"
          pt_BR: "WebP"
          ja_JP: "WebP"
extra:
  python:
    source: tools/imagen.py
