identity:
  name: "gpt-image"
  author: "langgenius"
  label:
    en_US: "GPT Image"
    zh_Hans: "GPT Image"
    pt_BR: "GPT Image"
    ja_JP: "GPT Image"
description:
  human:
    en_US: "OpenAI text-to-image. gpt-image-2 has the strongest instruction following, gpt-image-1.5 balances quality and cost, dall-e-3 is the long-standing photorealistic / artistic option."
    zh_Hans: "OpenAI 文生图。gpt-image-2 指令跟随最强，gpt-image-1.5 在质量与成本间均衡，dall-e-3 偏写实和艺术风。"
    pt_BR: "Texto-para-imagem da OpenAI. gpt-image-2 tem a melhor aderência ao prompt; gpt-image-1.5 equilibra qualidade e custo; dall-e-3 é a opção fotorrealista / artística clássica."
    ja_JP: "OpenAI のテキストから画像生成。gpt-image-2 はプロンプト追従性が最も高く、gpt-image-1.5 は品質とコストのバランス、dall-e-3 はフォトリアリスティック / アート系の定番。"
  llm: "Generate images with OpenAI: gpt-image-2 (best instruction following, recommended default), gpt-image-1.5 (balanced quality/cost), or dall-e-3 (photorealistic and artistic). Up to 4 images per call; outputs base64 or URL."
parameters:
  - name: prompt
    type: string
    required: true
    label:
      en_US: "Prompt"
      zh_Hans: "提示词"
      pt_BR: "Prompt"
      ja_JP: "プロンプト"
    human_description:
      en_US: "Text description of image you want to generate"
      zh_Hans: "您想要生成的图像的文字描述"
      pt_BR: "Descrição textual da imagem que você deseja gerar"
      ja_JP: "生成したい画像のテキスト説明"
    llm_description: "Text prompt for GPT Image generation, describing the desired image content"
    form: llm

  - name: model
    type: select
    required: false
    label:
      en_US: "Model"
      zh_Hans: "模型"
      pt_BR: "Modelo"
      ja_JP: "モデル"
    human_description:
      en_US: "GPT Image model to use"
      zh_Hans: "要使用的GPT Image模型"
      pt_BR: "Modelo GPT Image a ser usado"
      ja_JP: "使用するGPT Imageモデル"
    llm_description: "GPT Image model selection for image generation"
    form: form
    default: "gpt-image-2"
    options:
      - value: "gpt-image-2"
        label:
          en_US: "gpt-image-2"
          zh_Hans: "gpt-image-2"
          pt_BR: "gpt-image-2"
          ja_JP: "gpt-image-2"
      - value: "gpt-image-1.5"
        label:
          en_US: "gpt-image-1.5"
          zh_Hans: "gpt-image-1.5"
          pt_BR: "gpt-image-1.5"
          ja_JP: "gpt-image-1.5"
      - value: "dall-e-3"
        label:
          en_US: "dall-e-3"
          zh_Hans: "dall-e-3"
          pt_BR: "dall-e-3"
          ja_JP: "dall-e-3"
  
  - name: resolution
    type: select
    required: false
    label:
      en_US: "Resolution"
      zh_Hans: "分辨率"
      pt_BR: "Resolução"
      ja_JP: "解像度"
    human_description:
      en_US: "Image resolution"
      zh_Hans: "图像分辨率"
      pt_BR: "Resolução da imagem"
      ja_JP: "画像解像度"
    llm_description: "Output image resolution for GPT Image generation"
    form: form
    default: "1024x1024"
    options:
      - value: "auto"
        label:
          en_US: "auto"
          zh_Hans: "auto（自动）"
          pt_BR: "auto"
          ja_JP: "auto（自動）"
      - value: "1024x1024"
        label:
          en_US: "1024x1024"
          zh_Hans: "1024x1024"
          pt_BR: "1024x1024"
          ja_JP: "1024x1024"
      - value: "1536x1024"
        label:
          en_US: "1536x1024"
          zh_Hans: "1536x1024"
          pt_BR: "1536x1024"
          ja_JP: "1536x1024"
      - value: "1024x1536"
        label:
          en_US: "1024x1536"
          zh_Hans: "1024x1536"
          pt_BR: "1024x1536"
          ja_JP: "1024x1536"
  
  - name: num_images
    type: number
    required: false
    label:
      en_US: "Number of Images"
      zh_Hans: "生成数量"
      pt_BR: "Número de Imagens"
      ja_JP: "画像数"
    human_description:
      en_US: "Number of images to generate (1-4)"
      zh_Hans: "生成图像的数量 (1-4)"
      pt_BR: "Número de imagens para gerar (1-4)"
      ja_JP: "生成する画像の数 (1-4)"
    llm_description: "Number of GPT Image images to generate. Range: 1-4"
    form: form
    default: 1
    min: 1
    max: 4
  
  - name: moderation_level
    type: number
    required: false
    label:
      en_US: "Moderation Level"
      zh_Hans: "审核宽松度"
      pt_BR: "Nível de Moderação"
      ja_JP: "モデレーションレベル"
    human_description:
      en_US: "Content moderation strictness (0-6, where 0 is most strict)"
      zh_Hans: "内容审核严格程度 (0-6，0为最严格)"
      pt_BR: "Nível de rigor da moderação de conteúdo (0-6, onde 0 é mais rigoroso)"
      ja_JP: "コンテンツモデレーションの厳しさ (0-6、0が最も厳格)"
    llm_description: "Content moderation level for GPT Image generation. Range: 0-6, where 0 is most strict and 6 is most lenient"
    form: form
    default: 3
    min: 0
    max: 6

  - name: image_format
    type: select
    required: false
    label:
      en_US: "Image Format"
      zh_Hans: "图片格式"
      pt_BR: "Formato de Imagem"
      ja_JP: "画像フォーマット"
    human_description:
      en_US: "Output image format"
      zh_Hans: "输出图片格式"
      pt_BR: "Formato de saída da imagem"
      ja_JP: "出力画像フォーマット"
    llm_description: "Image format for GPT Image generation"
    form: form
    default: "png"
    options:
      - value: "png"
        label:
          en_US: "PNG"
          zh_Hans: "PNG"
          pt_BR: "PNG"
          ja_JP: "PNG"
      - value: "jpeg"
        label:
          en_US: "JPEG"
          zh_Hans: "JPEG"
          pt_BR: "JPEG"
          ja_JP: "JPEG"
      - value: "webp"
        label:
          en_US: "WebP"
          zh_Hans: "WebP"
          pt_BR: "WebP"
          ja_JP: "WebP"
extra:
  python:
    source: tools/gpt-image.py
