identity:
  name: "gemini-3-1-flash-lite-image"
  author: "langgenius"
  label:
    en_US: "Gemini 3.1 Flash Lite Image"
    zh_Hans: "Gemini 3.1 Flash Lite Image"
    pt_BR: "Gemini 3.1 Flash Lite Image"
    ja_JP: "Gemini 3.1 Flash Lite Image"
description:
  human:
    en_US: "Cost-efficient Gemini image generation and single-image editing. This model supports 1K output only."
    zh_Hans: "高性价比 Gemini 生图与单图编辑模型，仅支持 1K 输出。"
    pt_BR: "Geração e edição de imagem Gemini econômica, somente em 1K."
    ja_JP: "低コストの Gemini 画像生成・単一画像編集。出力は 1K のみです。"
  llm: "Generate or edit one image with Gemini 3.1 Flash Lite Image. Output resolution is fixed at 1K."
parameters:
  - name: prompt
    type: string
    required: true
    label:
      en_US: "Prompt"
      zh_Hans: "提示词"
      pt_BR: "Prompt"
      ja_JP: "プロンプト"
    human_description:
      en_US: "Describe the image to generate or how to change the reference image"
      zh_Hans: "描述要生成的图像，或说明如何修改参考图"
      pt_BR: "Descreva a imagem ou a edição desejada"
      ja_JP: "生成する画像または参照画像の編集内容を説明します"
    llm_description: "Image generation or editing instruction"
    form: llm

  - name: model
    type: select
    required: false
    label:
      en_US: "Model"
      zh_Hans: "模型"
      pt_BR: "Modelo"
      ja_JP: "モデル"
    human_description:
      en_US: "Fixed Gemini Flash Lite image model"
      zh_Hans: "固定的 Gemini Flash Lite 图像模型"
      pt_BR: "Modelo fixo Gemini Flash Lite Image"
      ja_JP: "固定の Gemini Flash Lite Image モデル"
    llm_description: "Fixed model selection"
    form: form
    default: "gemini-3.1-flash-lite-image"
    options:
      - value: "gemini-3.1-flash-lite-image"
        label:
          en_US: "gemini-3.1-flash-lite-image"
          zh_Hans: "gemini-3.1-flash-lite-image"
          pt_BR: "gemini-3.1-flash-lite-image"
          ja_JP: "gemini-3.1-flash-lite-image"

  - name: generation_mode
    type: select
    required: false
    label:
      en_US: "Generation Mode"
      zh_Hans: "生成模式"
      pt_BR: "Modo de Geração"
      ja_JP: "生成モード"
    human_description:
      en_US: "Generate from text or edit one reference image"
      zh_Hans: "文生图或编辑一张参考图"
      pt_BR: "Gerar a partir de texto ou editar uma imagem"
      ja_JP: "テキスト生成または参照画像の編集"
    llm_description: "Select text-to-image or image-to-image mode"
    form: form
    default: "text_to_image"
    options:
      - value: "text_to_image"
        label:
          en_US: "Text-to-Image"
          zh_Hans: "文生图"
          pt_BR: "Texto para imagem"
          ja_JP: "テキストから画像"
      - value: "image_to_image"
        label:
          en_US: "Image-to-Image"
          zh_Hans: "图生图"
          pt_BR: "Imagem para imagem"
          ja_JP: "画像から画像"

  - name: image
    type: string
    required: false
    label:
      en_US: "Reference Image"
      zh_Hans: "参考图"
      pt_BR: "Imagem de Referência"
      ja_JP: "参照画像"
    human_description:
      en_US: "Reference image URL, base64 data, or Dify file variable for image-to-image mode"
      zh_Hans: "图生图模式使用的图片 URL、base64 数据或 Dify 文件变量"
      pt_BR: "URL, base64 ou variável de arquivo Dify"
      ja_JP: "画像 URL、base64、または Dify ファイル変数"
    llm_description: "Reference image required for image-to-image mode"
    form: form

  - name: aspect_ratio
    type: select
    required: false
    label:
      en_US: "Aspect Ratio"
      zh_Hans: "宽高比"
      pt_BR: "Proporção"
      ja_JP: "アスペクト比"
    human_description:
      en_US: "Output image aspect ratio"
      zh_Hans: "输出图像宽高比"
      pt_BR: "Proporção da imagem"
      ja_JP: "出力画像のアスペクト比"
    llm_description: "Output image aspect ratio"
    form: form
    default: "1:1"
    options:
      - value: "1:1"
        label: {en_US: "1:1", zh_Hans: "1:1", pt_BR: "1:1", ja_JP: "1:1"}
      - value: "2:3"
        label: {en_US: "2:3", zh_Hans: "2:3", pt_BR: "2:3", ja_JP: "2:3"}
      - value: "3:2"
        label: {en_US: "3:2", zh_Hans: "3:2", pt_BR: "3:2", ja_JP: "3:2"}
      - value: "3:4"
        label: {en_US: "3:4", zh_Hans: "3:4", pt_BR: "3:4", ja_JP: "3:4"}
      - value: "4:3"
        label: {en_US: "4:3", zh_Hans: "4:3", pt_BR: "4:3", ja_JP: "4:3"}
      - value: "9:16"
        label: {en_US: "9:16", zh_Hans: "9:16", pt_BR: "9:16", ja_JP: "9:16"}
      - value: "16:9"
        label: {en_US: "16:9", zh_Hans: "16:9", pt_BR: "16:9", ja_JP: "16:9"}
      - value: "21:9"
        label: {en_US: "21:9", zh_Hans: "21:9", pt_BR: "21:9", ja_JP: "21:9"}

  - name: resolution
    type: select
    required: false
    label:
      en_US: "Resolution"
      zh_Hans: "分辨率"
      pt_BR: "Resolução"
      ja_JP: "解像度"
    human_description:
      en_US: "This model supports 1K only"
      zh_Hans: "该模型仅支持 1K"
      pt_BR: "Este modelo suporta apenas 1K"
      ja_JP: "このモデルは 1K のみ対応"
    llm_description: "Fixed 1K output resolution"
    form: form
    default: "1K"
    options:
      - value: "1K"
        label: {en_US: "1K", zh_Hans: "1K", pt_BR: "1K", ja_JP: "1K"}

extra:
  python:
    source: tools/gemini-3-pro-image-preview.py
