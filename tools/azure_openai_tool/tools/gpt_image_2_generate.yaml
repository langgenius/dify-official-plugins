description:
  human:
    en_US: GPT Image 2 Generate is a text to image generation tool for Azure OpenAI GPT-image-2 deployments.
    pt_BR: GPT Image 2 Generate é uma ferramenta de geração de imagem a partir de texto para implantações GPT-image-2 do Azure OpenAI.
    zh_Hans: GPT Image 2 Generate 是面向 Azure OpenAI GPT-image-2 部署的文本生成图像工具。
  llm: GPT Image 2 Generate is a tool used to generate images from text with an Azure OpenAI gpt-image-2 deployment.
extra:
  python:
    source: tools/gpt_image_2_generate.py
identity:
  author: langgenius
  description:
    en_US: Generate images with a dedicated Azure OpenAI GPT-image-2 tool.
    pt_BR: Gere imagens com uma ferramenta dedicada do Azure OpenAI GPT-image-2.
    zh_Hans: 使用独立的 Azure OpenAI GPT-image-2 工具生成图像。
  label:
    en_US: GPT Image 2 Generate
    pt_BR: GPT Image 2 Generate
    zh_Hans: GPT 图像 2 生成
  name: gpt_image_2_generate
output_schema:
  type: object
  properties:
    requested_n:
      type: integer
      description: Number of images requested by the workflow.
    actual_image_count:
      type: integer
      description: Number of images actually returned by the tool after any fallback retries.
    fallback_used:
      type: boolean
      description: Whether the tool had to make additional Azure calls to fulfill the requested image count.
parameters:
  - form: llm
    human_description:
      en_US: Detailed description of the image you want to generate with your Azure GPT-image-2 deployment.
      pt_BR: Descrição detalhada da imagem que você deseja gerar com sua implantação Azure GPT-image-2.
      zh_Hans: 使用你的 Azure GPT-image-2 部署生成图像的详细描述。
    label:
      en_US: Prompt
      pt_BR: Prompt
      zh_Hans: 提示词
    llm_description: Detailed image prompt for Azure OpenAI GPT-image-2 generation. Describe the desired image clearly.
    name: prompt
    required: true
    type: string
  - default: 1024x1024
    form: form
    human_description:
      en_US: Output size as a WxH string. Common values include 1024x1024, 1024x1536, and 1536x1024. GPT-image-2 deployments may support larger sizes allowed by Azure.
      pt_BR: Tamanho de saída como texto WxH. Valores comuns incluem 1024x1024, 1024x1536 e 1536x1024. Implantações GPT-image-2 podem aceitar tamanhos maiores permitidos pelo Azure.
      zh_Hans: 使用 WxH 字符串填写输出尺寸。常见值包括 1024x1024、1024x1536 和 1536x1024；若 Azure 部署允许，GPT-image-2 也可支持更大尺寸。
    label:
      en_US: Image Size
      pt_BR: Tamanho da imagem
      zh_Hans: 图像大小
    name: size
    required: false
    type: string
  - default: 1
    form: form
    human_description:
      en_US: Number of images to generate (between 1 and 10).
      pt_BR: Número de imagens a gerar (entre 1 e 10).
      zh_Hans: 要生成的图像数量（1 到 10）。
    label:
      en_US: Number of Images
      pt_BR: Número de imagens
      zh_Hans: 图像数量
    max: 10
    min: 1
    name: n
    required: false
    type: number
  - default: high
    form: form
    human_description:
      en_US: Select the image quality supported by your Azure GPT-image-2 deployment.
      pt_BR: Selecione a qualidade da imagem compatível com sua implantação Azure GPT-image-2.
      zh_Hans: 选择你的 Azure GPT-image-2 部署支持的图像质量。
    label:
      en_US: Image Quality
      pt_BR: Qualidade da imagem
      zh_Hans: 图像质量
    name: quality
    options:
      - label:
          en_US: Low
          pt_BR: Baixa
          zh_Hans: 低
        value: low
      - label:
          en_US: Medium
          pt_BR: Média
          zh_Hans: 中
        value: medium
      - label:
          en_US: High
          pt_BR: Alta
          zh_Hans: 高
        value: high
    required: false
    type: select
  - default: png
    form: form
    human_description:
      en_US: Select the output image format. Azure GPT-image APIs return base64 image data.
      pt_BR: Selecione o formato da imagem de saída. As APIs Azure GPT-image retornam dados de imagem em base64.
      zh_Hans: 选择输出图像格式。Azure GPT-image API 返回 base64 图像数据。
    label:
      en_US: Output Format
      pt_BR: Formato de Saída
      zh_Hans: 输出格式
    name: output_format
    options:
      - label:
          en_US: PNG
          pt_BR: PNG
          zh_Hans: PNG
        value: png
      - label:
          en_US: JPEG
          pt_BR: JPEG
          zh_Hans: JPEG
        value: jpeg
    required: false
    type: select
  - default: 100
    form: form
    human_description:
      en_US: Set compression level (0-100) for JPEG output.
      pt_BR: Defina o nível de compressão (0-100) para saída JPEG.
      zh_Hans: 设置 JPEG 输出的压缩级别（0-100）。
    label:
      en_US: Output Compression
      pt_BR: Compressão de Saída
      zh_Hans: 输出压缩
    name: output_compression
    max: 100
    min: 0
    required: false
    type: number
