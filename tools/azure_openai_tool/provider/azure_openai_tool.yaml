identity:
  author: langgenius
  name: azure_openai_tool
  label:
    en_US: Azure OpenAI image
    zh_Hans: Azure OpenAI 图像
    pt_BR: Azure OpenAI image
  description:
    en_US: Azure OpenAI Image Generation and Editing
    zh_Hans: Azure OpenAI 图像生成和编辑
    pt_BR: Azure OpenAI Image Generation and Editing
  icon: icon.png
  tags:
  - image
  - productivity
credentials_for_provider:
  azure_openai_api_key:
    type: secret-input
    required: true
    label:
      en_US: API key
      zh_Hans: 密钥
      pt_BR: API key
    help:
      en_US: Please input your Azure OpenAI API key
      zh_Hans: 请输入你的 Azure OpenAI API key
      pt_BR: Introduza a sua chave de API OpenAI do Azure
    placeholder:
      en_US: Please input your Azure OpenAI API key
      zh_Hans: 请输入你的 Azure OpenAI API key
      pt_BR: Introduza a sua chave de API OpenAI do Azure
  azure_openai_api_model_name:
    type: text-input
    required: true
    label:
      en_US: Deployment Name
      zh_Hans: 部署名称
      pt_BR: Nome da Implantação
    help:
      en_US: Please input the deployment name of your Azure OpenAI GPT-image series model (for example a gpt-image-2 deployment name).
      zh_Hans: 请输入你的 Azure OpenAI GPT-image 系列模型部署名称（例如某个 gpt-image-2 部署名）。
      pt_BR: Insira o nome da implantação do seu modelo da série GPT-image no Azure OpenAI (por exemplo, uma implantação do gpt-image-2).
    placeholder:
      en_US: "Enter your Azure OpenAI deployment name (for example: gpt-image-2)"
      zh_Hans: "请输入你的 Azure OpenAI 部署名称（例如：gpt-image-2）"
      pt_BR: "Insira o nome da implantação do Azure OpenAI (por exemplo: gpt-image-2)"
  azure_openai_base_url:
    type: text-input
    required: true
    label:
      en_US: API Base URL
      zh_Hans: API 基础 URL
      pt_BR: URL Base da API
    help:
      en_US: Please input your Azure OpenAI Base URL, e.g. https://********.openai.azure.com/
      zh_Hans: 请输入你的 Azure OpenAI API基础 URL，例如：https://********.openai.azure.com/
      pt_BR: Introduza a URL Base do Azure OpenAI, e.g. https://********.openai.azure.com/
    placeholder:
      en_US: Please input your Azure OpenAI Base URL, e.g. https://********.openai.azure.com/
      zh_Hans: 请输入你的 Azure OpenAI API基础 URL，例如：https://********.openai.azure.com/
      pt_BR: Introduza a URL Base do Azure OpenAI, e.g. https://********.openai.azure.com/
  azure_openai_api_version:
    type: text-input
    required: true
    label:
      en_US: API Version
      zh_Hans: API 版本
      pt_BR: API Version
    help:
      en_US: Please input your Azure OpenAI API version. Use 2025-04-01-preview or later for current GPT-image edit support.
      zh_Hans: 请输入你的 Azure OpenAI API 版本。若要使用当前的 GPT-image 编辑能力，请使用 2025-04-01-preview 或更高版本。
      pt_BR: Insira a versão da API do Azure OpenAI. Use 2025-04-01-preview ou superior para o suporte atual de edição com GPT-image.
    placeholder:
      en_US: 2025-04-01-preview
      zh_Hans: 2025-04-01-preview
      pt_BR: 2025-04-01-preview
extra:
  python:
    source: provider/azure_openai_tool.py
tools:
- tools/image_edit.yaml
- tools/image_generate.yaml
