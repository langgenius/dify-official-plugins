credentials_for_provider:
  api_url:
    label:
      en_US: API URL
      ja_JP: UnstructuredのAPI URL
      zh_Hans: Unstructured服务的API URL
    placeholder:
      en_US: Use https://mcp.transform.unstructured.io for Transform
      ja_JP: UnstructuredサーバのAPI URLを入力してください
      zh_Hans: 请输入你的 Unstructured 服务的 API URL
    required: true
    type: text-input
  api_key:
    label:
      en_US: API Key
      ja_JP: トークン
      zh_Hans: 令牌
    placeholder:
      en_US: Enter the API key for the selected Unstructured service
      ja_JP: Unstructuredサーバのトークンを入力してください
      zh_Hans: 请输入你的 Unstructured 服务的令牌
    required: false
    type: secret-input
    url: https://transform.unstructured.io/get-started
  server_type:
    label:
      en_US: Server Type
      ja_JP: サーバータイプ
      zh_Hans: 服务类型
    placeholder:
      en_US: Please select Unstructured service type, local deployment or official API
      ja_JP: Unstructuredサービスのタイプを選択してください、ローカルデプロイまたは公式API
      zh_Hans: 请选择Unstructured服务类型,本地部署或官方API
    required: true
    type: select
    options:
      - value: transform
        label:
          en_US: Unstructured Transform
          ja_JP: Unstructured Transform
          zh_Hans: Unstructured Transform
      - value: local
        label:
          en_US: Local Deployment
          ja_JP: ローカルデプロイ
          zh_Hans: 本地部署
      - value: remote
        label:
          en_US: Unstructured Official API
          ja_JP: Unstructured公式API
          zh_Hans: Unstructured官方API

identity:
  author: langgenius
  name: unstructured
  label:
    en_US: Unstructured
    zh_Hans: Unstructured
    pt_BR: Unstructured
  description:
    en_US: Convert PDFs, Office documents, HTML, and images into AI-ready structured output.
    zh_Hans: 将 PDF、Office 文档、HTML 和图像转换为适用于 AI 的结构化输出。
    pt_BR: Converta PDFs, documentos do Office, HTML e imagens em dados estruturados prontos para IA.
  icon: icon.svg
  tags: []
tools:
  - tools/partition.yaml
  - tools/transform.yaml
extra:
  python:
    source: provider/unstructured.py
