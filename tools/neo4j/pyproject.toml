[project]
name = "dify-neo4j"
version = "0.1.0"
description = "Neo4j graph database plugin for Dify"
readme = "README.md"
requires-python = ">=3.12"

# Managed with uv; refresh the lockfile with `uv lock`.
dependencies = [
    "dify_plugin>=0.9.0",
    "neo4j>=6.2.0",
]

# uv run black . -C -l 100 && uv run ruff check --fix
[dependency-groups]
dev = []
