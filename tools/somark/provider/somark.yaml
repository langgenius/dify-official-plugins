credentials_for_provider:

  base_url:
    label:
      en_US: Base URL
      zh_Hans: Base URL
    required: true
    type: select
    default: https://somark.cn/api/v1
    options:
      - value: https://somark.cn/api/v1
        label:
          en_US: Mainland China (somark.cn)
          zh_Hans: 中国大陆 (somark.cn)
      - value: https://somark.ai/api/v1
        label:
          en_US: Taiwan (China), Hong Kong (China), Macau (China), and other overseas regions (somark.ai)
          zh_Hans: 中国台湾、中国香港、中国澳门及其他海外地区 (somark.ai)
      - value: custom
        label:
          en_US: Self-hosted (custom URL)
          zh_Hans: 自托管（自定义地址）

  custom_base_url:
    label:
      en_US: Custom Base URL
      zh_Hans: 自定义 Base URL
    placeholder:
      en_US: https://your-domain.com/api/v1
      zh_Hans: https://your-domain.com/api/v1
    required: false
    type: text-input

  api_key:
    label:
      en_US: API Key
      zh_Hans: API Key
    placeholder:
      en_US: Required for SoMark API; leave blank for self-hosted deployment
      zh_Hans: 使用 SoMark API 时填写；私有化部署无需填写
    required: false
    type: secret-input
    url: https://docs.somark.ai/documentation/api

identity:
  author: SoulCode
  name: somark
  label:
    en_US: SoMark
    zh_Hans: SoMark
  description:
    en_US: SoMark Document Parsing Service
    zh_Hans: SoMark 文档解析服务
  icon: icon.png

extra:
  python:
    source: provider/somark.py

tools:
  - tools/extract.yaml
