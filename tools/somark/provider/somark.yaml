credentials_for_provider:

  base_url:
    label:
      en_US: Base URL
      zh_Hans: Base URL
    placeholder:
      en_US: For SoMark API, use https://somark.cn/api/v1 (Mainland China) or https://somark.ai/api/v1 (Taiwan, China; Hong Kong, China; Macau, China; and other overseas regions); for self-hosted deployment, fill in your local Base URL
      zh_Hans: 使用 SoMark API 时，中国大陆填写 https://somark.cn/api/v1，中国台湾、中国香港、中国澳门及其他海外地区填写 https://somark.ai/api/v1；私有化部署时填写本地部署的 Base URL
    required: true
    type: text-input

  api_key:
    label:
      en_US: API Key
      zh_Hans: API Key
    placeholder:
      en_US: Required for SoMark API; leave blank for self-hosted deployment
      zh_Hans: 使用 SoMark API 时填写；私有化部署无需填写
    required: false
    type: secret-input
    url: https://docs.somark.ai/documentation/api

identity:
  author: SoulCode
  name: somark
  label:
    en_US: SoMark
    zh_Hans: SoMark
  description:
    en_US: SoMark Document Parsing Service
    zh_Hans: SoMark 文档解析服务
  icon: icon.png

extra:
  python:
    source: provider/somark.py

tools:
  - tools/extract.yaml
