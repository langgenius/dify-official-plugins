[project]
name = "dify_extractor"
version = "0.1.0"
description = "Extract structured Markdown and documents from common file formats for Dify"
readme = "README.md"
requires-python = ">=3.12"

# Managed with uv; refresh the lockfile with `uv lock`.
dependencies = [
    "dify_plugin>=0.9.0",
    "chardet>=7.4.3",
    "python-docx>=1.2.0",
    "python-pptx>=1.0.2",
    "openpyxl>=3.1.5",
    "xlrd>=2.0.2",
    "pypdfium2>=5.8.0",
    "requests>=2.34.2",
    "PyYAML>=6.0.3",
    "pydantic>=2.13.4",
    "beautifulsoup4>=4.14.3",
]

[dependency-groups]
dev = [
    "pytest>=9.1.1",
    "ruff>=0.14.0",
    "xlwt>=1.3.0",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]
