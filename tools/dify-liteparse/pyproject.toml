[project]
name = "dify-liteparse"
version = "0.1.0"
description = "High-performance document parsing powered by LlamaIndex LiteParse. Converts PDFs/Docs to clean Markdown."
readme = "README.md"
requires-python = ">=3.12"

# uv pip compile pyproject.toml -o ./requirements.txt
dependencies = [
    "dify_plugin>=0.5.0",
    "liteparse",
    "llama-index-core",
]

# uv run black . -C -l 100 && uv run ruff check --fix
[dependency-groups]
dev = []
