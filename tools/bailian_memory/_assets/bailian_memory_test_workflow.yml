    # ============================================================
    # Code2: 验证AddMemory(custom)返回结构并合并ID
    # ============================================================
    - data:
        code: |
          def main(raw: list, prev_ids: str) -> dict:
              result = raw[0] if isinstance(raw, list) else raw
              errors = []
              if "request_id" not in result:
                  errors.append("AddMemory(custom): missing 'request_id'")
              if "memory_nodes" not in result:
                  errors.append("AddMemory(custom): missing 'memory_nodes'")
              elif not isinstance(result["memory_nodes"], list):
                  errors.append("AddMemory(custom): 'memory_nodes' is not a list")

              nodes = result.get("memory_nodes", [])
              custom_nid = ""
              if nodes:
                  custom_nid = nodes[0].get("memory_node_id", "")
                  if not custom_nid:
                      errors.append("AddMemory(custom): first node missing 'memory_node_id'")

              all_ids = prev_ids + "," + custom_nid if prev_ids else custom_nid
              return {
                  "custom_node_id": custom_nid,
                  "all_node_ids": all_ids,
                  "validation": "PASS" if not errors else "; ".join(errors)
              }
        code_language: python3
        desc: '验证AddMemory(custom)返回结构，合并所有记忆ID'
        outputs:
          custom_node_id:
            children: null
            type: string
          all_node_ids:
            children: null
            type: string
          validation:
            children: null
            type: string
        selected: false
        title: '验证+合并记忆ID'
        type: code
        variables:
        - value_selector:
