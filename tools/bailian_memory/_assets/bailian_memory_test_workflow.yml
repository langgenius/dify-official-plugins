    # ============================================================
    # 1. AddMemory (messages格式)
    # ============================================================
    - data:
        desc: '测试从对话消息中自动提取记忆'
        provider_id: langgenius/bailian_memory/bailian_memory
        provider_name: langgenius/bailian_memory/bailian_memory
        provider_type: builtin
        selected: false
        title: '1. AddMemory (messages)'
        tool_configurations: {}
        tool_label: Add Memory
        tool_name: add_memory
        tool_node_version: '2'
        tool_parameters:
          user_id:
            type: constant
            value: 'dify_workflow_test_user'
          messages:
            type: constant
            value: '[{"role":"user","content":"我叫小明，今年28岁，住在杭州，是一名设计师"},{"role":"assistant","content":"你好小明！杭州很美。"},{"role":"user","content":"每天下午3点提醒我喝咖啡"},{"role":"assistant","content":"好的，已记录。"}]'
          custom_content:
            type: constant
            value: ''
          profile_schema_id:
            type: constant
            value: ''
          meta_data:
            type: constant
            value: ''
        type: tool
      height: 90
      id: tool1
      position:
        x: 334
        y: 300
      positionAbsolute:
        x: 334
        y: 300
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244

    # ============================================================
    # Code1: 验证AddMemory(messages)返回结构并提取ID
    # ============================================================
    - data:
        code: |
          def main(raw: list) -> dict:
              result = raw[0] if isinstance(raw, list) else raw
              errors = []
              if "request_id" not in result:
                  errors.append("AddMemory(messages): missing 'request_id'")
              if "memory_nodes" not in result:
                  errors.append("AddMemory(messages): missing 'memory_nodes'")
              elif not isinstance(result["memory_nodes"], list):
                  errors.append("AddMemory(messages): 'memory_nodes' is not a list")

              nodes = result.get("memory_nodes", [])
              first_id = ""
              all_ids = ""
              if nodes:
                  for n in nodes:
                      if "memory_node_id" not in n:
                          errors.append("AddMemory(messages): memory_node missing 'memory_node_id'")
                          break
                  first_id = nodes[0].get("memory_node_id", "")
                  all_ids = ",".join([n.get("memory_node_id", "") for n in nodes])

              return {
                  "first_node_id": first_id,
                  "all_node_ids": all_ids,
                  "validation": "PASS" if not errors else "; ".join(errors)
              }
        code_language: python3
        desc: '验证AddMemory(messages)返回结构，提取memory_node_id'
        outputs:
          first_node_id:
            children: null
            type: string
          all_node_ids:
            children: null
            type: string
          validation:
            children: null
            type: string
        selected: false
        title: '验证+提取记忆ID'
        type: code
        variables:
        - value_selector:
          - tool1
          - json
          variable: raw
      height: 102
      id: code1
      position:
        x: 638
        y: 300
      positionAbsolute:
        x: 638
        y: 300
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244

