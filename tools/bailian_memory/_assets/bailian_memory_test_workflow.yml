    # ============================================================
    # 综合验证: 检查所有工具JSON返回结构是否符合API预期
    # ============================================================
    - data:
        code: |
          import json

          def unwrap(raw):
              return raw[0] if isinstance(raw, list) else raw

          def check_keys(data: dict, required_keys: list, tool_name: str) -> list:
              errors = []
              for key in required_keys:
                  if key not in data:
                      errors.append(f"{tool_name}: missing '{key}'")
              return errors

          def main(
              r1_add_msg: list,
              r2_add_custom: list,
              r3_search: list,
              r4_list: list,
              r5_update: list,
              r6_create_schema: list,
              r7_list_schemas: list,
              r8_get_schema: list,
              r9_update_schema: list,
              r10_add_profile: list,
              r11_get_profile: list,
              r12_delete_mem: list,
              r13_delete_schema: list,
              v_code1: str,
              v_code2: str,
              v_code3: str,
          ) -> dict:
              all_errors = []

              d1 = unwrap(r1_add_msg)
              d2 = unwrap(r2_add_custom)
              d3 = unwrap(r3_search)
              d4 = unwrap(r4_list)
              d5 = unwrap(r5_update)
              d6 = unwrap(r6_create_schema)
              d7 = unwrap(r7_list_schemas)
              d8 = unwrap(r8_get_schema)
              d9 = unwrap(r9_update_schema)
              d10 = unwrap(r10_add_profile)
              d11 = unwrap(r11_get_profile)
              d12 = unwrap(r12_delete_mem)
              d13 = unwrap(r13_delete_schema)

              # 1. AddMemory(messages): expect {memory_nodes: [...], request_id}
              all_errors += check_keys(d1, ["memory_nodes", "request_id"], "AddMemory(messages)")
              nodes = d1.get("memory_nodes", [])
              if isinstance(nodes, list) and nodes:
                  all_errors += check_keys(nodes[0], ["memory_node_id"], "AddMemory(messages).memory_nodes[0]")

              # 2. AddMemory(custom): expect {memory_nodes: [...], request_id}
              all_errors += check_keys(d2, ["memory_nodes", "request_id"], "AddMemory(custom)")

              # 3. SearchMemory: expect {memory_nodes: [...], request_id}
              all_errors += check_keys(d3, ["memory_nodes", "request_id"], "SearchMemory")

              # 4. ListMemory: expect {memory_nodes, page_num, page_size, request_id, total}
              all_errors += check_keys(d4, ["memory_nodes", "page_num", "page_size", "request_id", "total"], "ListMemory")

              # 5. UpdateMemory: expect {request_id}
              all_errors += check_keys(d5, ["request_id"], "UpdateMemory")

              # 6. CreateProfileSchema: expect {profile_schema_id, request_id}
              all_errors += check_keys(d6, ["profile_schema_id", "request_id"], "CreateProfileSchema")

              # 7. ListProfileSchemas: expect {profile_schemas, request_id, total}
              all_errors += check_keys(d7, ["profile_schemas", "request_id", "total"], "ListProfileSchemas")

              # 8. GetProfileSchema: expect {attributes, name, request_id}
              all_errors += check_keys(d8, ["attributes", "name", "request_id"], "GetProfileSchema")

              # 9. UpdateProfileSchema: expect {request_id}
              all_errors += check_keys(d9, ["request_id"], "UpdateProfileSchema")

              # 10. AddMemory+Profile: expect {memory_nodes, request_id}
              all_errors += check_keys(d10, ["memory_nodes", "request_id"], "AddMemory+Profile")

              # 11. GetUserProfile: expect {profile, request_id}
              all_errors += check_keys(d11, ["profile", "request_id"], "GetUserProfile")

              # 12. DeleteMemory: expect {request_id}
              all_errors += check_keys(d12, ["request_id"], "DeleteMemory")

              # 13. DeleteProfileSchema: expect {request_id}
              all_errors += check_keys(d13, ["request_id"], "DeleteProfileSchema")

              # Collect code node validations
              code_validations = []
              for label, v in [("code1", v_code1), ("code2", v_code2), ("code3", v_code3)]:
                  if v != "PASS":
                      code_validations.append(f"{label}: {v}")

              total_checks = 13
              failed = len(all_errors) + len(code_validations)
              passed = total_checks - len(all_errors)

              summary_lines = [f"=== Bailian Memory JSON Validation ==="]
              summary_lines.append(f"Tools checked: {total_checks}")
              summary_lines.append(f"Passed: {passed}/{total_checks}")

              if all_errors:
                  summary_lines.append(f"\nTool Errors:")
                  for e in all_errors:
                      summary_lines.append(f"  FAIL: {e}")

              if code_validations:
                  summary_lines.append(f"\nCode Node Errors:")
                  for e in code_validations:
                      summary_lines.append(f"  FAIL: {e}")

              if not all_errors and not code_validations:
                  summary_lines.append(f"\nAll 13 tools return valid JSON with expected keys!")

              report = "\n".join(summary_lines)
              return {
                  "report": report,
                  "all_passed": "true" if not all_errors and not code_validations else "false",
                  "error_count": str(failed),
                  "errors_detail": json.dumps(all_errors + code_validations, ensure_ascii=False) if (all_errors or code_validations) else "[]"
              }
        code_language: python3
