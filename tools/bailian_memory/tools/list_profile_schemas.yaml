      en_US: Page number starting from 1 (default 1)
      zh_Hans: 页码，从 1 开始（默认 1）
      ja_Jp: ページ番号、1から開始（デフォルト1）
    llm_description: Page number, starting from 1. Default is 1.
    form: llm
  - name: page_size
    type: number
    required: false
    label:
      en_US: Page Size
      zh_Hans: 每页条目数
      ja_Jp: ページサイズ
    human_description:
      en_US: Number of items per page (default 10)
      zh_Hans: 每页条目数（默认 10）
      ja_Jp: ページあたりの項目数（デフォルト10）
