identity:
  name: list_profile_schemas
  author: 佐井
  label:
    en_US: List Profile Schemas
    zh_Hans: 获取画像模板列表
    ja_Jp: プロファイルスキーマ一覧
description:
  human:
    en_US: List all profile schema templates with pagination.
    zh_Hans: 分页获取所有画像模板列表。
    ja_Jp: ページネーション付きで全プロファイルスキーマテンプレートを一覧表示します。
