subscription_schema: []

subscription_constructor:
  parameters:
  - name: "mailbox_address"
    type: "string"
    required: false
    label:
      en_US: "Shared Mailbox Address"
      zh_Hans: "共享邮箱地址"
      ja_JP: "共有メールボックスのアドレス"
    description:
      en_US: "SMTP address of a shared mailbox to monitor (e.g., support@example.com). The authorized account must have access to this shared mailbox, and the Azure app requires the Mail.Read.Shared permission. Leave empty to monitor the authorized account's own inbox."
      zh_Hans: "要监听的共享邮箱的 SMTP 地址（如 support@example.com）。授权账号必须拥有该共享邮箱的访问权限，且 Azure 应用需具备 Mail.Read.Shared 权限。留空则监听授权账号自己的收件箱。"
      ja_JP: "監視する共有メールボックスの SMTP アドレス（例: support@example.com）。認可されたアカウントがこの共有メールボックスへのアクセス権を持ち、Azure アプリに Mail.Read.Shared 権限が必要です。空の場合は認可アカウント自身の受信トレイを監視します。"
    placeholder:
      en_US: "support@example.com (leave empty for your own inbox)"
      zh_Hans: "support@example.com（留空则监听自己的收件箱）"
      ja_JP: "support@example.com（空の場合は自分の受信トレイ）"
    url: https://learn.microsoft.com/en-us/graph/outlook-share-messages-folders
  credentials_schema:
    access_tokens:
      help:
        en_US: Get your Access Tokens from Azure
        ja_JP: Azure からアクセストークンを取得してください
        zh_Hans: 从 Azure 获取您的 Access Tokens
      label:
        en_US: Access Tokens
        ja_JP: アクセストークン
        zh_Hans: Access Tokens
      placeholder:
        en_US: Please input your Azure Access Tokens
        ja_JP: Azure のアクセストークンを入力してください
        zh_Hans: 请输入你的 Azure Access Tokens
      required: true
      type: secret-input
      url: https://entra.microsoft.com/#home
    refresh_token:
      help:
        en_US: Get your Refresh Tokens from Azure
        ja_JP: Azure からリフレッシュトークンを取得してください
        zh_Hans: 从 Azure 获取您的 Refresh Tokens
      label:
        en_US: Refresh Tokens
        ja_JP: リフレッシュトークン
        zh_Hans: Refresh Tokens
      placeholder:
        en_US: Please input your Azure Refresh Tokens
        ja_JP: Azure のリフレッシュトークンを入力してください
        zh_Hans: 请输入你的 Azure Refresh Tokens
      required: true
      type: secret-input
      url: https://entra.microsoft.com/#home
  oauth_schema:
    client_schema:
    - name: "tenant_id"
      type: "secret-input"
      required: false
      url: https://portal.azure.com
      placeholder:
        en_US: "Tenant ID/domain, organizations, or common"
        zh_Hans: "租户 ID/域名、organizations 或 common"
        ja_JP: "テナントID/ドメイン、organizations、common"
      help:
        en_US: "Use a tenant ID or domain for single-tenant apps, organizations for work or school accounts only, or common only when personal Microsoft accounts are required."
        zh_Hans: "填租户 ID 或域名用于单租户；填 organizations 仅允许组织账号；只有需要个人 Microsoft 账号时才填 common。"
        ja_JP: "シングルテナントの場合はテナントIDまたはドメイン、職場または学校アカウントのみの場合は organizations、個人の Microsoft アカウントが必要な場合のみ common を入力します。"
      label:
        en_US: "Tenant"
        zh_Hans: "Tenant"
        ja_JP: "テナント"
      default: "organizations"
    - name: "client_id"
      type: "secret-input"
      required: true
      url: https://portal.azure.com
      placeholder:
        en_US: "Please input your Azure Client ID"
        zh_Hans: "请输入你的 Azure Client ID"
        ja_JP: "Azure クライアントIDを入力してください"
      help:
        en_US: "Client ID for your Azure application."
        zh_Hans: "你的 Azure 应用程序的 Client ID。"
        ja_JP: "あなたの Azure アプリケーションのクライアントIDです。"
      label:
        en_US: "Client ID"
        zh_Hans: "Client ID"
        ja_JP: "クライアントID"
    - name: "client_secret"
      type: "secret-input"
      required: true
      url: https://portal.azure.com
      placeholder:
        en_US: "Please input your Azure Client Secret"
        zh_Hans: "请输入你的 Azure Client Secret"
        ja_JP: "Azure クライアントシークレットを入力してください"
      help:
        en_US: "Client Secret for your Azure application."
        zh_Hans: "你的 Azure 应用程序的 Client Secret。"
        ja_JP: "あなたの Azure アプリケーションのクライアントシークレットです。"
      label:
        en_US: "Client Secret"
        zh_Hans: "Client Secret"
        ja_JP: "クライアントシークレット"
    credentials_schema:
    - name: "access_tokens"
      type: "secret-input"
      label:
        zh_Hans: "Access Token"
        en_US: "Access Token"
        ja_JP: "アクセストークン"
    - name: "refresh_token"
      type: "secret-input"
      label:
        zh_Hans: "Refresh Token"
        en_US: "Refresh Token"
        ja_JP: "リフレッシュトークン"
  extra:
    python:
      source: provider/outlook.py

events:
  - events/email_received.yaml

identity:
  author: langgenius
  description:
    en_US: Outlook Trigger is a plugin that allows you to trigger actions based on Outlook events.
    ja_JP: Outlook Triggerは、Outlookイベントに基づいてアクションをトリガーするプラグインです。
    zh_Hans: Outlook Trigger是一个插件，允许您基于Outlook事件触发操作。
  icon: icon.svg
  label:
    en_US: Outlook Triggers
    zh_Hans: Outlook 触发器
    ja_JP: Outlook トリガー
  name: outlook_trigger

extra:
  python:
    source: provider/outlook.py
