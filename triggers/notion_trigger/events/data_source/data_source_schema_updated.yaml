identity:
  name: data_source_schema_updated
  author: langgenius
  label:
    en_US: Data Source Schema Updated
    ja_JP: Data Source Schema Updated
    zh_Hans: Data Source Schema Updated
description:
  en_US: Triggered when Notion emits the data_source.schema_updated webhook event.
  ja_JP: Notion で data_source.schema_updated Webhook イベントが発生したときにトリガーされます。
  zh_Hans: 当 Notion 触发 data_source.schema_updated Webhook 事件时触发。
parameters:
- name: workspace_filter
  type: string
  required: false
  label:
    en_US: Workspace Filter
    ja_JP: ワークスペースフィルター
    zh_Hans: 工作区过滤器
  description:
    en_US: "Comma separated workspace IDs to forward events from. Leave blank to accept all workspaces."
    ja_JP: "イベントを転送するワークスペース ID をカンマ区切りで指定します。空欄の場合はすべてを受け入れます。"
    zh_Hans: "使用逗号分隔的工作区 ID，仅接收这些工作区的事件。留空接收所有工作区。"
- name: parent_type
  type: select
  required: false
  label:
    en_US: Parent Type
    ja_JP: 親タイプ
    zh_Hans: 父级类型
  description:
    en_US: "Filter by parent type. Leave blank to accept all."
    ja_JP: "親タイプでフィルタします。空欄の場合はすべてを受け入れます。"
    zh_Hans: "按父级类型过滤。留空接收所有。"
  options:
  - value: workspace
    label:
      en_US: Workspace
      ja_JP: ワークスペース
      zh_Hans: 工作区
  - value: database_id
    label:
      en_US: Database
      ja_JP: データベース
      zh_Hans: 数据库
  - value: page_id
    label:
      en_US: Page
      ja_JP: ページ
      zh_Hans: 页面
  - value: block_id
    label:
      en_US: Block
      ja_JP: ブロック
      zh_Hans: 块
- name: parent_id
  type: string
  required: false
  label:
    en_US: Parent ID
    ja_JP: 親 ID
    zh_Hans: 父级 ID
  description:
    en_US: "Comma separated parent IDs to filter by. Leave blank to accept all."
    ja_JP: "フィルタする親 ID をカンマ区切りで指定します。空欄の場合はすべてを受け入れます。"
    zh_Hans: "使用逗号分隔的父级 ID 进行过滤。留空接收所有。"

output_schema:
  type: object
  properties:
    id:
      type: string
    type:
      type: string
    timestamp:
      type: string
    workspace_id:
      type: string
    subscription_id:
      type: string
    integration_id:
      type: string
    entity:
      type: object
    entity_content:
      type: object
      description: Full data source object retrieved from Notion API.
      properties:
        object:
          type: string
          description: Always `data_source`.
        id:
          type: string
        created_time:
          type: string
        last_edited_time:
          type: string
        parent:
          type: object
          description: Parent database reference.
        database_parent:
          type: object
          description: Page hosting the database.
        properties:
          type: object
          description: Data source schema keyed by property name.
      required: [object, id]
    data:
      type: object
  required: [id, type, timestamp, workspace_id]

extra:
  python:
    source: events/data_source/data_source_schema_updated.py
