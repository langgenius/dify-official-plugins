identity:
  name: database_undeleted
  author: langgenius
  label:
    en_US: Database Undeleted
    ja_JP: Database Undeleted
    zh_Hans: Database Undeleted
description:
  en_US: Triggered when Notion emits the database.undeleted webhook event.
  ja_JP: Notion で database.undeleted Webhook イベントが発生したときにトリガーされます。
  zh_Hans: 当 Notion 触发 database.undeleted Webhook 事件时触发。
parameters:
- name: workspace_filter
  type: string
  required: false
  label:
    en_US: Workspace Filter
    ja_JP: ワークスペースフィルター
    zh_Hans: 工作区过滤器
  description:
    en_US: "Comma separated workspace IDs to forward events from. Leave blank to accept all workspaces."
    ja_JP: "イベントを転送するワークスペース ID をカンマ区切りで指定します。空欄の場合はすべてを受け入れます。"
    zh_Hans: "使用逗号分隔的工作区 ID，仅接收这些工作区的事件。留空接收所有工作区。"
- name: parent_type
  type: select
  required: false
  label:
    en_US: Parent Type
    ja_JP: 親タイプ
    zh_Hans: 父级类型
  description:
    en_US: "Filter by parent type. Leave blank to accept all."
    ja_JP: "親タイプでフィルタします。空欄の場合はすべてを受け入れます。"
    zh_Hans: "按父级类型过滤。留空接收所有。"
  options:
  - value: workspace
    label:
      en_US: Workspace
      ja_JP: ワークスペース
      zh_Hans: 工作区
  - value: database_id
    label:
      en_US: Database
      ja_JP: データベース
      zh_Hans: 数据库
  - value: page_id
    label:
      en_US: Page
      ja_JP: ページ
      zh_Hans: 页面
  - value: block_id
    label:
      en_US: Block
      ja_JP: ブロック
      zh_Hans: 块
- name: parent_id
  type: string
  required: false
  label:
    en_US: Parent ID
    ja_JP: 親 ID
    zh_Hans: 父级 ID
  description:
    en_US: "Comma separated parent IDs to filter by. Leave blank to accept all."
    ja_JP: "フィルタする親 ID をカンマ区切りで指定します。空欄の場合はすべてを受け入れます。"
    zh_Hans: "使用逗号分隔的父级 ID 进行过滤。留空接收所有。"

output_schema:
  type: object
  properties:
    id:
      type: string
    type:
      type: string
    timestamp:
      type: string
    workspace_id:
      type: string
    subscription_id:
      type: string
    integration_id:
      type: string
    entity:
      type: object
    entity_content:
      type: object
      description: Full database object retrieved from Notion API.
      properties:
        object:
          type: string
          description: Always `database`.
        id:
          type: string
        title:
          type: array
          description: Rich text title for the database.
          items:
            type: object
        parent:
          type: object
          description: Parent reference for the database.
        is_inline:
          type: boolean
        data_sources:
          type: array
          description: Data sources defined under the database.
          items:
            type: object
        properties:
          type: object
          description: Database schema keyed by property name.
        cover:
          type: object
        icon:
          type: object
      required: [object, id]
    data:
      type: object
  required: [id, type, timestamp, workspace_id]

extra:
  python:
    source: events/database/database_undeleted.py
