identity:
  name: "emoji_changed"
  author: "langgenius"
  label:
    en_US: "Emoji Changed"
    ja_JP: "Emoji Changed"
    zh_Hans: "Emoji Changed"
description:
  en_US: "A custom emoji has been added or changed. See https://api.slack.com/events/emoji_changed for details."
  ja_JP: "A custom emoji has been added or changed. See https://api.slack.com/events/emoji_changed for details."
  zh_Hans: "A custom emoji has been added or changed. See https://api.slack.com/events/emoji_changed for details."
parameters:
- name: subtype
  label:
    en_US: Subtype
    zh_Hans: 子类型
    ja_JP: サブタイプ
  type: select
  required: false
  options:
  - value: add
    label:
      en_US: Add
      zh_Hans: 添加
      ja_JP: 追加
  - value: remove
    label:
      en_US: Remove
      zh_Hans: 删除
      ja_JP: 削除
  - value: rename
    label:
      en_US: Rename
      zh_Hans: 重命名
      ja_JP: リネーム
  description:
    en_US: "Only trigger for this emoji change subtype. Leave empty to accept all subtypes (add, remove, rename)."
    zh_Hans: "仅当表情符号变更为此子类型时触发。留空表示接受所有子类型。"
    ja_JP: "この変更サブタイプのみトリガー。空の場合は全サブタイプ（add、remove、rename）を許可。"
output_schema:
  type: "object"
  properties:
    event_topic:
      type: "string"
      description: "Slack event topic identifier."
    event_type:
      type: "string"
      description: "Slack event type value reported in the payload."
    event_id:
      type: "string"
      description: "Unique Slack event ID."
    team_id:
      type: "string"
      description: "Slack workspace team ID."
    api_app_id:
      type: "string"
      description: "Slack application ID receiving the event."
    event_time:
      type: "string"
      description: "Event timestamp provided by Slack."
    event_context:
      type: "string"
      description: "Slack event context reference."
    authorizations:
      type: "array"
      description: "Authorizations included in the event envelope."
      items:
        type: "object"
    authed_users:
      type: "array"
      description: "Authed user identifiers granted to this app."
      items:
        type: "string"
    authed_teams:
      type: "array"
      description: "Authed team identifiers granted to this app."
      items:
        type: "string"
    is_ext_shared_channel:
      type: "boolean"
      description: "Whether the event originated from an externally shared channel."
    channel_type:
      type: "string"
      description: "Channel classification associated with the event when applicable."
    summary:
      type: "string"
      description: "Short description of the Slack event."
    doc_url:
      type: "string"
      description: "Documentation URL for the Slack event."
    scopes_required:
      type: "array"
      description: "OAuth scopes required to receive this event."
      items:
        type: "string"
    tokens_allowed:
      type: "array"
      description: "Token types allowed to subscribe to this event."
      items:
        type: "string"
    tags:
      type: "array"
      description: "Slack metadata tags describing the event."
      items:
        type: "string"
    event_body:
      type: "object"
      description: "Sanitized Slack event body content."
    raw_payload:
      type: "object"
      description: "Sanitized Slack event envelope received from Slack."
  required:
    - "event_topic"
    - "event_type"
    - "event_id"
    - "team_id"
    - "api_app_id"
    - "event_time"
    - "event_context"
    - "authorizations"
    - "authed_users"
    - "authed_teams"
    - "is_ext_shared_channel"
    - "channel_type"
    - "summary"
    - "doc_url"
    - "scopes_required"
    - "tokens_allowed"
    - "tags"
    - "event_body"
    - "raw_payload"
extra:
  python:
    source: "events/emoji/emoji_changed.py"
