identity:
  name: "reaction_added"
  author: "langgenius"
  label:
    en_US: "Reaction Added"
    ja_JP: "Reaction Added"
    zh_Hans: "Reaction Added"
description:
  en_US: "A member has added an emoji reaction to an item. See https://api.slack.com/events/reaction_added for details."
  ja_JP: "A member has added an emoji reaction to an item. See https://api.slack.com/events/reaction_added for details."
  zh_Hans: "A member has added an emoji reaction to an item. See https://api.slack.com/events/reaction_added for details."
parameters:
- name: reaction
  label:
    en_US: Reaction
    zh_Hans: 表情
    ja_JP: リアクション
  type: string
  required: false
  description:
    en_US: "Comma-separated emoji names without colons (e.g. thumbsup,white_check_mark). Leave empty to accept all reactions."
    zh_Hans: "要过滤的表情符号名称（逗号分隔，不带冒号，如 thumbsup,white_check_mark）。留空表示不过滤。"
    ja_JP: "フィルタする絵文字名（カンマ区切り、コロン不要。例: thumbsup,white_check_mark）。空の場合は全リアクションを許可。"
- name: item_type
  label:
    en_US: Item Type
    zh_Hans: 项目类型
    ja_JP: アイテムタイプ
  type: select
  required: false
  options:
  - value: message
    label:
      en_US: Message
      zh_Hans: 消息
      ja_JP: メッセージ
  - value: file
    label:
      en_US: File
      zh_Hans: 文件
      ja_JP: ファイル
  - value: file_comment
    label:
      en_US: File Comment
      zh_Hans: 文件评论
      ja_JP: ファイルコメント
  description:
    en_US: "Only trigger when the reaction was added to this type of item. Leave empty to accept all item types."
    zh_Hans: "仅当对此类型的项目添加反应时触发。留空表示不过滤。"
    ja_JP: "このアイテムタイプへのリアクションのみトリガー。空の場合は全タイプを許可。"
- name: user_id
  label:
    en_US: User ID
    zh_Hans: 用户 ID
    ja_JP: ユーザー ID
  type: string
  required: false
  description:
    en_US: "Comma-separated Slack user IDs. Only trigger when the reaction is from one of these users."
    zh_Hans: "要过滤的用户 ID（逗号分隔）。仅当反应来自这些用户时触发。"
    ja_JP: "ユーザー ID（カンマ区切り）。これらのユーザーによるリアクションのみトリガー。"
output_schema:
  type: "object"
  properties:
    event_topic:
      type: "string"
      description: "Slack event topic identifier."
    event_type:
      type: "string"
      description: "Slack event type value reported in the payload."
    event_id:
      type: "string"
      description: "Unique Slack event ID."
    team_id:
      type: "string"
      description: "Slack workspace team ID."
    api_app_id:
      type: "string"
      description: "Slack application ID receiving the event."
    event_time:
      type: "string"
      description: "Event timestamp provided by Slack."
    event_context:
      type: "string"
      description: "Slack event context reference."
    authorizations:
      type: "array"
      description: "Authorizations included in the event envelope."
      items:
        type: "object"
    authed_users:
      type: "array"
      description: "Authed user identifiers granted to this app."
      items:
        type: "string"
    authed_teams:
      type: "array"
      description: "Authed team identifiers granted to this app."
      items:
        type: "string"
    is_ext_shared_channel:
      type: "boolean"
      description: "Whether the event originated from an externally shared channel."
    channel_type:
      type: "string"
      description: "Channel classification associated with the event when applicable."
    summary:
      type: "string"
      description: "Short description of the Slack event."
    doc_url:
      type: "string"
      description: "Documentation URL for the Slack event."
    scopes_required:
      type: "array"
      description: "OAuth scopes required to receive this event."
      items:
        type: "string"
    tokens_allowed:
      type: "array"
      description: "Token types allowed to subscribe to this event."
      items:
        type: "string"
    tags:
      type: "array"
      description: "Slack metadata tags describing the event."
      items:
        type: "string"
    event_body:
      type: "object"
      description: "Sanitized Slack event body content."
    raw_payload:
      type: "object"
      description: "Sanitized Slack event envelope received from Slack."
  required:
    - "event_topic"
    - "event_type"
    - "event_id"
    - "team_id"
    - "api_app_id"
    - "event_time"
    - "event_context"
    - "authorizations"
    - "authed_users"
    - "authed_teams"
    - "is_ext_shared_channel"
    - "channel_type"
    - "summary"
    - "doc_url"
    - "scopes_required"
    - "tokens_allowed"
    - "tags"
    - "event_body"
    - "raw_payload"
extra:
  python:
    source: "events/reaction/reaction_added.py"
