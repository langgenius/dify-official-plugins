identity:
  name: "star_removed"
  author: "langgenius"
  label:
    en_US: "Star Removed"
    ja_JP: "Star Removed"
    zh_Hans: "Star Removed"
description:
  en_US: "A member removed a star. See https://api.slack.com/events/star_removed for details."
  ja_JP: "A member removed a star. See https://api.slack.com/events/star_removed for details."
  zh_Hans: "A member removed a star. See https://api.slack.com/events/star_removed for details."
parameters:
- name: item_type
  label:
    en_US: Item Type
    zh_Hans: 项目类型
    ja_JP: アイテムタイプ
  type: select
  required: false
  options:
  - value: message
    label:
      en_US: Message
      zh_Hans: 消息
      ja_JP: メッセージ
  - value: file
    label:
      en_US: File
      zh_Hans: 文件
      ja_JP: ファイル
  - value: channel
    label:
      en_US: Channel
      zh_Hans: 频道
      ja_JP: チャンネル
  - value: im
    label:
      en_US: Direct Message
      zh_Hans: 私信
      ja_JP: ダイレクトメッセージ
  - value: app
    label:
      en_US: App
      zh_Hans: 应用
      ja_JP: アプリ
  description:
    en_US: "Only trigger when a star is removed from this type of item. Leave empty to accept all item types."
    zh_Hans: "仅当从此类型的项目移除收藏时触发。留空表示不过滤。"
    ja_JP: "このアイテムタイプへのスター削除のみトリガー。空の場合は全タイプを許可。"
output_schema:
  type: "object"
  properties:
    event_topic:
      type: "string"
      description: "Slack event topic identifier."
    event_type:
      type: "string"
      description: "Slack event type value reported in the payload."
    event_id:
      type: "string"
      description: "Unique Slack event ID."
    team_id:
      type: "string"
      description: "Slack workspace team ID."
    api_app_id:
      type: "string"
      description: "Slack application ID receiving the event."
    event_time:
      type: "string"
      description: "Event timestamp provided by Slack."
    event_context:
      type: "string"
      description: "Slack event context reference."
    authorizations:
      type: "array"
      description: "Authorizations included in the event envelope."
      items:
        type: "object"
    authed_users:
      type: "array"
      description: "Authed user identifiers granted to this app."
      items:
        type: "string"
    authed_teams:
      type: "array"
      description: "Authed team identifiers granted to this app."
      items:
        type: "string"
    is_ext_shared_channel:
      type: "boolean"
      description: "Whether the event originated from an externally shared channel."
    channel_type:
      type: "string"
      description: "Channel classification associated with the event when applicable."
    summary:
      type: "string"
      description: "Short description of the Slack event."
    doc_url:
      type: "string"
      description: "Documentation URL for the Slack event."
    scopes_required:
      type: "array"
      description: "OAuth scopes required to receive this event."
      items:
        type: "string"
    tokens_allowed:
      type: "array"
      description: "Token types allowed to subscribe to this event."
      items:
        type: "string"
    tags:
      type: "array"
      description: "Slack metadata tags describing the event."
      items:
        type: "string"
    event_body:
      type: "object"
      description: "Sanitized Slack event body content."
    raw_payload:
      type: "object"
      description: "Sanitized Slack event envelope received from Slack."
  required:
    - "event_topic"
    - "event_type"
    - "event_id"
    - "team_id"
    - "api_app_id"
    - "event_time"
    - "event_context"
    - "authorizations"
    - "authed_users"
    - "authed_teams"
    - "is_ext_shared_channel"
    - "channel_type"
    - "summary"
    - "doc_url"
    - "scopes_required"
    - "tokens_allowed"
    - "tags"
    - "event_body"
    - "raw_payload"
extra:
  python:
    source: "events/star/star_removed.py"
