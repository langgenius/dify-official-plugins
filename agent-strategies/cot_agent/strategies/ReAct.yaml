identity:
  name: ReAct
  author: Dify
  label:
    en_US: ReAct
    zh_Hans: ReAct
    pt_BR: ReAct
description:
  en_US: "Text-based reasoning strategy (Thought → Action → Observation loop). Best for models that do NOT support function calling. If your model supports function calling, use the FunctionCalling strategy instead for better results."
  zh_Hans: "基于文本的推理策略（Thought → Action → Observation 循环）。适用于不支持函数调用的模型。如果您的模型支持函数调用，建议使用 FunctionCalling 策略以获得更好的效果。"
  pt_BR: "Estratégia de raciocínio baseada em texto (ciclo Thought → Action → Observation). Melhor para modelos que NÃO suportam chamada de função. Se seu modelo suporta chamada de função, use a estratégia FunctionCalling para melhores resultados."
features:
  - history-messages
parameters:
  - name: model
    type: model-selector
    scope: llm
    required: true
    label:
      en_US: Model
      zh_Hans: 模型
      pt_BR: Model
  - name: tools
    type: array[tools]
    required: true
    label:
      en_US: Tool list
      zh_Hans: 工具列表
      pt_BR: Tool list
  - name: instruction
    type: string
    required: true
    label:
      en_US: Instruction
      zh_Hans: 指令
      pt_BR: Instruction
    auto_generate:
      type: prompt_instruction
    template:
      enabled: true
  - name: context
    type: any
    scope: array[object]
    required: false
    label:
      en_US: Context
      zh_Hans: 上下文
      pt_BR: Context
  - name: query
    type: string
    required: true
    label:
      en_US: Query
      zh_Hans: 查询
      pt_BR: Query
  - name: maximum_iterations
    type: number
    required: true
    label:
      en_US: Maximum Iterations
      zh_Hans: 最大迭代次数
      pt_BR: Maximum Iterations
    default: 3
    min: 1
    max: 500
extra:
  python:
    source: strategies/ReAct.py
