model: openai/gpt-5.2
label:
  en_US: openai/gpt-5.2
model_type: llm
features:
  - tool-call
model_properties:
  mode: chat
  context_size: 400000
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    type: int
    default: 512
    min: 1
    max: 32768
    required: true
  - name: temperature
    use_template: temperature
    type: float
    default: 0.7
    min: 0
    max: 1
    precision: 2
    required: false
  - name: top_p
    use_template: top_p
    type: float
    default: 0.9
    min: 0
    max: 1
    precision: 2
    required: false
pricing:
  input: '0'
  output: '0'
  unit: '0.001'
  currency: USD
