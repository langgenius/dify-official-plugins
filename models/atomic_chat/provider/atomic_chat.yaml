provider: atomic_chat
label:
  en_US: Atomic Chat
  zh_Hans: Atomic Chat
description:
  en_US: Run local LLMs privately with Atomic Chat's OpenAI-compatible API.
  zh_Hans: 通过 Atomic Chat 的 OpenAI 兼容 API 在本地私密运行大语言模型。
icon_small:
  en_US: icon.svg
supported_model_types:
  - llm
configurate_methods:
  - customizable-model
model_credential_schema:
  model:
    label:
      en_US: Model Name
      zh_Hans: 模型名称
    placeholder:
      en_US: Enter the model id from Atomic Chat
      zh_Hans: 输入 Atomic Chat 中的模型 ID
  credential_form_schemas:
    - variable: endpoint_url
      label:
        en_US: API endpoint URL
        zh_Hans: API endpoint URL
      type: text-input
      required: true
      default: "http://127.0.0.1:1337/v1"
      placeholder:
        en_US: Base URL, e.g. http://127.0.0.1:1337/v1
        zh_Hans: 基础 URL，例如 http://127.0.0.1:1337/v1
    - variable: api_key
      label:
        en_US: API Key
        zh_Hans: API Key
      type: secret-input
      required: false
      placeholder:
        en_US: Optional for local installs
        zh_Hans: 本地安装通常可留空
    - variable: context_size
      label:
        en_US: Model context size
        zh_Hans: 模型上下文长度
      required: true
      show_on:
        - variable: __model_type
          value: llm
      type: text-input
      default: "8192"
      placeholder:
        en_US: Enter your model context size
        zh_Hans: 输入模型上下文长度
    - variable: agent_thought_support
      show_on:
        - variable: __model_type
          value: llm
      label:
        en_US: Agent Thought
        zh_Hans: 思考模式
      type: radio
      required: false
      default: supported
      options:
        - value: supported
          label:
            en_US: Support
            zh_Hans: 支持
        - value: not_supported
          label:
            en_US: Not Support
            zh_Hans: 不支持
    - variable: vision_support
      show_on:
        - variable: __model_type
          value: llm
      label:
        en_US: Vision Support
        zh_Hans: 视觉支持
      type: radio
      required: false
      default: no_support
      options:
        - value: support
          label:
            en_US: Support
            zh_Hans: 支持
        - value: no_support
          label:
            en_US: Not Support
            zh_Hans: 不支持
extra:
  python:
    provider_source: provider/atomic_chat.py
    model_sources:
      - "models/llm/llm.py"
help:
  title:
    en_US: How to integrate Atomic Chat
    zh_Hans: 如何集成 Atomic Chat
  url:
    en_US: https://atomic.chat
