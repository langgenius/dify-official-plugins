provider: aimlapi
label:
  en_US: AI/ML API
description:
  en_US: OpenAI-compatible access to multiple model families through AI/ML API.
icon_small:
  en_US: icon.svg
icon_large:
  en_US: icon.svg
background: "#111827"
help:
  title:
    en_US: Get your API key from AI/ML API
  url:
    en_US: https://aimlapi.com/app/keys
supported_model_types:
  - llm
configurate_methods:
  - predefined-model
  - customizable-model
provider_credential_schema:
  credential_form_schemas:
    - variable: api_key
      label:
        en_US: API Key
      type: secret-input
      required: true
      placeholder:
        en_US: Enter your AI/ML API key
model_credential_schema:
  model:
    label:
      en_US: Model Name
    placeholder:
      en_US: Enter full AI/ML API model ID
  credential_form_schemas:
    - variable: api_key
      label:
        en_US: API Key
      type: secret-input
      required: true
      placeholder:
        en_US: Enter your AI/ML API key
    - variable: mode
      show_on:
        - variable: __model_type
          value: llm
      label:
        en_US: Completion mode
      type: select
      required: false
      default: chat
      placeholder:
        en_US: Select completion mode
      options:
        - value: completion
          label:
            en_US: Completion
        - value: chat
          label:
            en_US: Chat
models:
  llm:
    position: models/llm/_position.yaml
    predefined:
      - models/llm/*.yaml
extra:
  python:
    provider_source: provider/aimlapi.py
    model_sources:
      - models/llm/llm.py
