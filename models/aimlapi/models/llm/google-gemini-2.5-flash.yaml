model: google/gemini-2.5-flash
label:
  en_US: Gemini 2.5 Flash
model_type: llm
features:
  - multi-tool-call
  - stream-tool-call
  - vision
model_properties:
  mode: chat
  context_size: 1048576
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: max_tokens
    use_template: max_tokens
    default: 4096
    min: 1
    max: 65536
  - name: response_format
    use_template: response_format
pricing:
  input: "0.30"
  output: "2.50"
  unit: "0.000001"
  currency: USD
