background: '#FCFDFF'
configurate_methods:
- predefined-model
description:
  en_US: Vertex AI in Google Cloud Platform.
extra:
  python:
    model_sources:
    - models/llm/llm.py
    - models/text_embedding/text_embedding.py
    provider_source: provider/vertex_ai.py
help:
  title:
    en_US: Get your Access Details from Google
  url:
    en_US: https://cloud.google.com/vertex-ai/
icon_large:
  en_US: icon_l_en.png
icon_small:
  en_US: icon_s_en.svg
label:
  en_US: Vertex AI | Google Cloud Platform
models:
  llm:
    predefined:
    - models/llm/*.yaml
  text_embedding:
    predefined:
    - models/text_embedding/*.yaml
provider: vertex_ai
provider_credential_schema:
  credential_form_schemas:
  - label:
      en_US: Project ID
    placeholder:
      en_US: Enter your Google Cloud Project ID
    required: true
    type: text-input
    variable: vertex_project_id
  - label:
      en_US: Location
    placeholder:
      en_US: Enter your Google Cloud Location
    required: true
    type: text-input
    variable: vertex_location
  - label:
      en_US: Service Account Key (Leave blank if you use Application Default Credentials)
    placeholder:
      en_US: Enter your Google Cloud Service Account Key in base64 format
    required: false
    type: secret-input
    variable: vertex_service_account_key
  - label:
      en_US: Anthropic Models Location (optional)
    placeholder:
      en_US: Enter your Google Cloud Location for Anthropic (Claude) models, overrides default location for Claude on Vertex
    required: false
    type: text-input
    variable: vertex_anthropic_location
  - label:
      en_US: Global-only Models (optional)
    placeholder:
      en_US: Comma-separated model IDs that must use the global endpoint, overrides defaults
    required: false
    type: text-input
    variable: vertex_global_models
  - default: disabled
    label:
      en_US: Enable Cloud Billing metadata labels (optional)
    required: false
    type: select
    options:
    - value: enabled
      label:
        en_US: Enabled
    - value: disabled
      label:
        en_US: Disabled
    help:
      en_US: When enabled, attaches dify_app_id and dify_source labels to Vertex AI requests, enabling per-app cost breakdown in Cloud Billing. Default disabled.
    variable: enable_request_metadata
supported_model_types:
- llm
- text-embedding
