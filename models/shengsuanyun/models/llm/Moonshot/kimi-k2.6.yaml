model: moonshot/kimi-k2.6
label:
  en_US: Kimi K2.6
model_type: llm
features:
  - agent-thought
model_properties:
  mode: chat
  context_size: 256000
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    required: true
    default: 32000
    min: 1
    max: 32000
  - name: response_format
    use_template: response_format
pricing:
  input: '0.009285'
  output: '0.038571'
  currency: CNY
  unit: '0.000001'
