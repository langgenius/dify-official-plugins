model: google/gemma-4-31b-it
label:
  en_US: Gemma 4
model_type: llm
features:
  - agent-thought
model_properties:
  mode: chat
  context_size: 1048576
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    required: true
    default: 65535
    min: 1
    max: 65535
  - name: response_format
    use_template: response_format
pricing:
  input: '0.001459'
  output: '0.004379'
  currency: CNY
  unit: '0.000001'
