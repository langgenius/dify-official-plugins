model: ali/qwen3.7-max
label:
  en_US: Qwen3.7-Max（限时5折）
model_type: llm
features:
  - agent-thought
model_properties:
  mode: chat
  context_size: 1000000
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    required: true
    default: 64000
    min: 1
    max: 64000
  - name: response_format
    use_template: response_format
pricing:
  input: '0.008571'
  output: '0.025714'
  currency: CNY
  unit: '0.000001'
