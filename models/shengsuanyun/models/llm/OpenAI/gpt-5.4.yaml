model: openai/gpt-5.4
label:
  en_US: GPT-5.4
model_type: llm
features:
  - agent-thought
model_properties:
  mode: chat
  context_size: 400000
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    required: true
    default: 128000
    min: 1
    max: 128000
  - name: response_format
    use_template: response_format
pricing:
  input: '0.025'
  output: '0.15'
  currency: CNY
  unit: '0.000001'
