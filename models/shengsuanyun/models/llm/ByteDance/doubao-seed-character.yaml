model: bytedance/doubao-seed-character
label:
  en_US: Doubao-Seed-Character
model_type: llm
features:
  - agent-thought
model_properties:
  mode: chat
  context_size: 128000
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    required: true
    default: 96000
    min: 1
    max: 96000
  - name: response_format
    use_template: response_format
pricing:
  input: '0.001142'
  output: '0.002857'
  currency: CNY
  unit: '0.000001'
