model: bigmodel/glm-5.2
label:
  en_US: GLM-5.2
model_type: llm
features:
  - agent-thought
model_properties:
  mode: chat
  context_size: 1000000
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    required: true
    default: 128000
    min: 1
    max: 128000
  - name: response_format
    use_template: response_format
pricing:
  input: '0.011428'
  output: '0.039999'
  currency: CNY
  unit: '0.000001'
