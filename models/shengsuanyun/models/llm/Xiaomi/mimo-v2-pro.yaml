model: xiaomi/mimo-v2-pro
label:
  en_US: MiMo-V2-Pro
model_type: llm
features:
  - agent-thought
model_properties:
  mode: chat
  context_size: 1000000
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    required: true
    default: 128000
    min: 1
    max: 128000
  - name: response_format
    use_template: response_format
pricing:
  input: '0.009999'
  output: '0.029999'
  currency: CNY
  unit: '0.000001'
