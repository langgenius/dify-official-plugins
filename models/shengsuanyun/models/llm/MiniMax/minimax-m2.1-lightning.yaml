model: minimax/minimax-m2.1-lightning
label:
  en_US: MiniMax M2.1 lightning
model_type: llm
features:
  - agent-thought
  - vision
model_properties:
  mode: chat
  context_size: 200000
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    required: true
    default: 131000
    min: 1
    max: 131000
  - name: response_format
    use_template: response_format
pricing:
  input: '0.003057'
  output: '0.024456'
  currency: CNY
  unit: '0.000001'
