model: minimax/minimax-m3
label:
  en_US: MiniMax M3（5折）
model_type: llm
features:
  - agent-thought
model_properties:
  mode: chat
  context_size: 1000000
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    required: true
    default: 1000000
    min: 1
    max: 1000000
  - name: response_format
    use_template: response_format
pricing:
  input: '0.002999'
  output: '0.011999'
  currency: CNY
  unit: '0.000001'
