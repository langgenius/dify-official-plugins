configurate_methods:
  - customizable-model
extra:
  python:
    model_sources:
      - models/llm/llm.py
      - models/rerank/rerank.py
      - models/speech2text/speech2text.py
      - models/tts/tts.py
      - models/text_embedding/text_embedding.py
    provider_source: provider/gpustack.py
icon_large:
  en_US: icon_l_en.png
icon_small:
  en_US: icon_s_en.png
label:
  en_US: GPUStack
model_credential_schema:
  credential_form_schemas:
    - variable: display_name
      show_on:
        - variable: __model_type
          value: llm
      label:
        en_US: Model display name
        zh_Hans: 模型显示名称
      type: text-input
      required: false
      placeholder:
        zh_Hans: 模型在界面的显示名称
        en_US: The display name of the model in the interface.
    - label:
        en_US: Server URL
        zh_Hans: 服务器地址
      placeholder:
        en_US: Enter the GPUStack server URL, e.g. http://192.168.1.100
        zh_Hans: 输入 GPUStack 的服务器地址，如 http://192.168.1.100
      required: true
      type: text-input
      variable: endpoint_url
    - variable: endpoint_model_name
      show_on:
        - variable: __model_type
          value: llm
      label:
        zh_Hans: API endpoint中的模型名称
        en_US: model name for API endpoint
      type: text-input
      required: false
      placeholder:
        zh_Hans: endpoint model name, e.g. qwen3.6-35b-a3b
        en_US: endpoint model name, e.g. qwen3.6-35b-a3b
    - label:
        en_US: API Key
      placeholder:
        en_US: Enter your API Key
        zh_Hans: 输入您的 API Key
      required: true
      type: secret-input
      variable: api_key
    - default: chat
      label:
        en_US: Completion mode
      options:
        - label:
            en_US: Completion
            zh_Hans: 补全
          value: completion
        - label:
            en_US: Chat
            zh_Hans: 对话
          value: chat
      placeholder:
        en_US: Select completion type
        zh_Hans: 选择补全类型
      required: false
      show_on:
        - value: llm
          variable: __model_type
      type: select
      variable: mode
    - default: "8192"
      label:
        en_US: Model context size
        zh_Hans: 模型上下文长度
      placeholder:
        en_US: Enter your Model context size
        zh_Hans: 输入您的模型上下文长度
      required: true
      type: text-input
      variable: context_size
    - default: "8192"
      label:
        en_US: Upper bound for max tokens
        zh_Hans: 最大 token 上限
      show_on:
        - value: llm
          variable: __model_type
      type: text-input
      variable: max_tokens_to_sample
    - variable: agent_thought_support
      show_on:
        - variable: __model_type
          value: llm
      label:
        en_US: Thinking Mode Support
        zh_Hans: 思考模式支持
      type: select
      required: false
      default: not_supported
      options:
        - value: only_thinking_supported
          label:
            en_US: Only Thinking Mode
            zh_Hans: 仅支持思考模式
        - value: not_supported
          label:
            en_US: Only Non-Thinking Mode
            zh_Hans: 仅支持非思考模式
        - value: supported
          label:
            en_US: Both Modes
            zh_Hans: 两种模式都支持
      help:
        en_US: Configure whether the model supports thinking mode, non-thinking mode, or both. This controls the thinking toggle and reasoning settings.
        zh_Hans: 配置模型是否支持思考模式、非思考模式或两者都支持。这会控制思考开关和推理相关参数。
    - variable: compatibility_mode
      show_on:
        - variable: __model_type
          value: llm
      label:
        en_US: Compatibility mode
        zh_Hans: 兼容模式
      type: select
      required: false
      default: strict
      options:
        - value: strict
          label:
            en_US: OpenAI compatible
            zh_Hans: 严格（OpenAI 兼容）
        - value: extended
          label:
            en_US: Enable extra settings
            zh_Hans: 扩展（启用额外设置）
      help:
        en_US: Choose strict OpenAI compatibility or extended settings that add extra parameters such as thinking and chat_template_kwargs.
        zh_Hans: 选择严格的 OpenAI 兼容或扩展设置（会添加 thinking、chat_template_kwargs 等额外参数）。
    - variable: token_param_name
      show_on:
        - variable: __model_type
          value: llm
      label:
        en_US: Token parameter name
        zh_Hans: token 参数名
      type: select
      required: false
      default: auto
      options:
        - value: auto
          label:
            en_US: Auto (detect by model)
            zh_Hans: 自动（按模型判断）
        - value: max_tokens
          label:
            en_US: Use max_tokens
            zh_Hans: 使用 max_tokens
        - value: max_completion_tokens
          label:
            en_US: Use max_completion_tokens
            zh_Hans: 使用 max_completion_tokens
      help:
        en_US: Some OpenAI-compatible endpoints require max_completion_tokens (Responses API). Choose explicitly if auto-detection is wrong.
        zh_Hans: 一些兼容端要求使用 max_completion_tokens（Responses API）。若自动判断不准确，可在此显式指定。
    - default: no_call
      label:
        en_US: Function calling
      options:
        - label:
            en_US: Function Call
            zh_Hans: Function Call
          value: function_call
        - label:
            en_US: Tool Call
            zh_Hans: Tool Call
          value: tool_call
        - label:
            en_US: Not Support
            zh_Hans: 不支持
          value: no_call
      required: false
      show_on:
        - value: llm
          variable: __model_type
      type: select
      variable: function_calling_type

    - default: not_support
      label:
        en_US: Stream Function Calling
      options:
        - label:
            en_US: Supported
            zh_Hans: 支持
          value: supported
        - label:
            en_US: Not Supported
            zh_Hans: 不支持
          value: not_support
      required: false
      show_on:
        - value: llm
          variable: __model_type
      type: select
      variable: stream_function_calling
    - default: no_support
      label:
        en_US: Vision Support
        zh_Hans: Vision 支持
      options:
        - label:
            en_US: Support
            zh_Hans: 支持
          value: support
        - label:
            en_US: Not Support
            zh_Hans: 不支持
          value: no_support
      required: false
      show_on:
        - value: llm
          variable: __model_type
      type: select
      variable: vision_support
    - variable: structured_output_support
      show_on:
        - variable: __model_type
          value: llm
      label:
        en_US: Structured Output
      type: select
      required: false
      default: not_supported
      options:
        - value: supported
          label:
            en_US: Support
            zh_Hans: 支持
        - value: not_supported
          label:
            en_US: Not Support
            zh_Hans: 不支持
    - variable: stream_mode_auth
      show_on:
        - variable: __model_type
          value: llm
      label:
        zh_Hans: 流模式授权
        en_US: Stream mode auth
      type: select
      required: false
      default: not_use
      options:
        - value: use
          label:
            en_US: Use
            zh_Hans: 使用
        - value: not_use
          label:
            en_US: Not Use
            zh_Hans: 不使用
    - variable: stream_mode_delimiter
      label:
        zh_Hans: 流模式返回结果的分隔符
        en_US: Delimiter for streaming results
      show_on:
        - variable: __model_type
          value: llm
      default: '\n\n'
      type: text-input
    - variable: voices
      show_on:
        - variable: __model_type
          value: tts
      label:
        en_US: Available Voices (comma-separated)
        zh_Hans: 可用声音（用英文逗号分隔）
      type: text-input
      required: false
      default: "Chinese Female"
      placeholder:
        en_US: "Chinese Female,Chinese Male, Japanese Male, Cantonese Female, English Female, English Male, Korean Female"
        zh_Hans: "Chinese Female,Chinese Male, Japanese Male, Cantonese Female, English Female, English Male, Korean Female"
      help:
        en_US: "List voice names separated by commas. First voice will be used as default."
        zh_Hans: "用英文逗号分隔的声音列表。第一个声音将作为默认值。"
    - variable: timeout
      label:
        en_US: Timeout(s)
        zh_Hans: 超时时间(秒)
      type: text-input
      required: false
      default: "600"
      placeholder:
        en_US: "600"
        zh_Hans: "600"
      help:
        en_US: "The maximum time to wait for the model to complete the task(seconds)."
        zh_Hans: "等待模型完成任务的最大时间(秒)。"
      show_on:
        - value: rerank
          variable: __model_type
  model:
    label:
      en_US: Model Name
      zh_Hans: 模型名称
    placeholder:
      en_US: Enter your model name
      zh_Hans: 输入模型名称
provider: gpustack
supported_model_types:
  - llm
  - text-embedding
  - rerank
  - speech2text
  - tts
