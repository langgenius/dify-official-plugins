background: "#E8F5E9"
configurate_methods:
  - predefined-model
  - customizable-model
description:
  en_US: JalapenoCloud - AI Model Platform
  zh_Hans: JalapenoCloud - AI 模型聚合平台
extra:
  python:
    model_sources:
      - models/llm/llm.py
    provider_source: provider/jalapenocloud.py
help:
  title:
    en_US: Get your API Key from JalapenoCloud
    zh_Hans: 从 JalapenoCloud 获取 API Key
  url:
    en_US: https://www.jalapeno-cloud.ai/
icon_large:
  en_US: jalapenocloud.png
icon_small:
  en_US: jalapenocloud_square.png
label:
  en_US: JalapenoCloud
  zh_Hans: JalapenoCloud
model_credential_schema:
  credential_form_schemas:
    - label:
        en_US: API Key
        zh_Hans: API Key
      placeholder:
        en_US: Enter your API Key
        zh_Hans: 在此输入您的 API Key
      required: true
      type: secret-input
      variable: api_key
    - default: "4096"
      label:
        en_US: Model context size
        zh_Hans: 模型上下文长度
      placeholder:
        en_US: Enter your Model context size
        zh_Hans: 在此输入您的模型上下文长度
      required: true
      type: text-input
      variable: context_size
    - default: "4096"
      label:
        en_US: Upper bound for max tokens
        zh_Hans: 最大 token 上限
      show_on:
        - value: llm
          variable: __model_type
      type: text-input
      variable: max_tokens
    - default: tool_call
      label:
        en_US: Function calling
        zh_Hans: 函数调用
      options:
        - label:
            en_US: Not Support
            zh_Hans: 不支持
          value: no_call
        - label:
            en_US: Support
            zh_Hans: 支持
          value: tool_call
      required: false
      show_on:
        - value: llm
          variable: __model_type
      type: select
      variable: function_calling_type
  model:
    label:
      en_US: Model Name
      zh_Hans: 模型名称
    placeholder:
      en_US: Enter your model name
      zh_Hans: 输入模型名称
models:
  llm:
    position: models/llm/_position.yaml
    predefined:
      - models/llm/*.yaml
provider: jalapenocloud
provider_credential_schema:
  credential_form_schemas:
    - label:
        en_US: API Key
        zh_Hans: API Key
      placeholder:
        en_US: Enter your API Key
        zh_Hans: 在此输入您的 API Key
      required: true
      type: secret-input
      variable: api_key
supported_model_types:
  - llm
