version: 0.0.1
type: plugin
author: langgenius
name: jalapenocloud
label:
  en_US: JalapenoCloud
  zh_Hans: JalapenoCloud
description:
  en_US: >-
    JalapenoCloud provides access to various AI models (LLMs) through a unified
    OpenAI-compatible API key.
  zh_Hans: >-
    JalapenoCloud 提供对各种 AI 模型（LLM）的访问，可通过统一 API Key 调用。
icon: jalapenocloud_square.png
resource:
  memory: 268435456
  permission:
    model:
      enabled: true
      llm: true
      text_embedding: false
      rerank: false
      tts: false
      speech2text: false
      moderation: false
plugins:
  models:
    - provider/jalapenocloud.yaml
meta:
  version: 0.0.1
  arch:
    - amd64
    - arm64
  runner:
    language: python
    version: "3.12"
    entrypoint: main
  minimum_dify_version: 1.0.0
created_at: "2026-07-23T12:00:00+08:00"
privacy: PRIVACY.md
verified: false
