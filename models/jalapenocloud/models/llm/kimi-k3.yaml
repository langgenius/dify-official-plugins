model: Kimi-K3
label:
  en_US: Kimi-K3
  zh_Hans: Kimi-K3
model_type: llm
features:
  - agent-thought
  - tool-call
  - multi-tool-call
  - stream-tool-call
  - vision
model_properties:
  mode: chat
  context_size: 1048576
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: max_tokens
    use_template: max_tokens
    type: int
    default: 32768
    min: 1
    max: 65536
  - name: top_p
    use_template: top_p
  - name: frequency_penalty
    use_template: frequency_penalty
  - name: enable_thinking
    required: false
    type: boolean
    default: true
    label:
      zh_Hans: 思考模式
      en_US: Thinking mode
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    required: false
    options:
      - text
      - json_object
pricing:
  input: "3.00"
  output: "15.00"
  unit: "0.000001"
  currency: USD
