model: minimax/minimax-m2.5
label:
  en_US: MiniMax M2.5
model_type: llm
features:
  - tool-call
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 196000
parameter_rules:
  - name: temperature
    use_template: temperature
    default: 1
    min: 0
    max: 2
  - name: top_p
    use_template: top_p
    default: 0.95
    min: 0.1
    max: 1
  - name: top_k
    label:
      zh_Hans: 取样数量
      en_US: Top k
    type: int
    help:
      zh_Hans: 仅从每个后续标记的前 K 个选项中采样。
      en_US: Only sample from the top K options for each subsequent token.
    required: false
    default: 50
    min: 1
    max: 100
  - name: presence_penalty
    use_template: presence_penalty
  - name: frequency_penalty
    use_template: frequency_penalty
  - name: max_tokens
    use_template: max_tokens
    default: 16384
    min: 1
    max: 195000
pricing:
  input: "0.30"
  output: "1.20"
  unit: "0.000001"
  currency: USD
