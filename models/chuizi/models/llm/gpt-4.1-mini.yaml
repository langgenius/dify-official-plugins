model: openai/gpt-4.1-mini
label:
  en_US: GPT-4.1 Mini
  zh_Hans: GPT-4.1 Mini
model_type: llm
features:
  - agent-thought
  - vision
  - tool-call
  - multi-tool-call
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 200000
parameter_rules:
  - name: temperature
    use_template: temperature
    type: float
    default: 1
    min: 0
    max: 2
  - name: max_tokens
    use_template: max_tokens
    required: true
    default: 32768
    min: 1
    max: 32768
  - name: response_format
    use_template: response_format
pricing:
  input: '0.40'
  output: '1.60'
  unit: '0.000001'
  currency: USD
