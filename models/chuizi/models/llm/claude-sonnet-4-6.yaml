model: anthropic/claude-sonnet-4-6
label:
  en_US: Claude Sonnet 4.6
  zh_Hans: Claude Sonnet 4.6
model_type: llm
features:
  - agent-thought
  - vision
  - tool-call
  - multi-tool-call
  - stream-tool-call
  - document
model_properties:
  mode: chat
  context_size: 200000
parameter_rules:
  - name: temperature
    use_template: temperature
    type: float
    default: 1
    min: 0
    max: 2
  - name: max_tokens
    use_template: max_tokens
    required: true
    default: 16000
    min: 1
    max: 128000
  - name: response_format
    use_template: response_format
pricing:
  input: '3.00'
  output: '15.00'
  unit: '0.000001'
  currency: USD
