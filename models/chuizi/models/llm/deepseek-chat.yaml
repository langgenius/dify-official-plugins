model: deepseek/deepseek-chat
label:
  en_US: DeepSeek V3.2
  zh_Hans: DeepSeek V3.2
model_type: llm
features:
  - agent-thought
  - tool-call
  - multi-tool-call
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 131072
parameter_rules:
  - name: temperature
    use_template: temperature
    type: float
    default: 1
    min: 0
    max: 2
  - name: max_tokens
    use_template: max_tokens
    required: true
    default: 8192
    min: 1
    max: 8192
  - name: response_format
    use_template: response_format
pricing:
  input: '0.28'
  output: '0.42'
  unit: '0.000001'
  currency: USD
