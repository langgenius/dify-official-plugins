model: anthropic/claude-haiku-4-5
label:
  en_US: Claude Haiku 4.5
  zh_Hans: Claude Haiku 4.5
model_type: llm
features:
  - agent-thought
  - vision
  - tool-call
  - multi-tool-call
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 200000
parameter_rules:
  - name: temperature
    use_template: temperature
    type: float
    default: 1
    min: 0
    max: 2
  - name: max_tokens
    use_template: max_tokens
    required: true
    default: 8192
    min: 1
    max: 8192
  - name: response_format
    use_template: response_format
pricing:
  input: '1.00'
  output: '5.00'
  unit: '0.000001'
  currency: USD
