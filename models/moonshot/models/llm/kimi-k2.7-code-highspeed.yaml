model: kimi-k2.7-code-highspeed
label:
  zh_Hans: kimi-k2.7-code-highspeed
  en_US: kimi-k2.7-code-highspeed
model_type: llm
features:
  - vision
  - agent-thought
  - tool-call
  - multi-tool-call
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 262144
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    default: 32768
    min: 1
    max: 262144
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    help:
      zh_Hans: 指定模型必须输出的格式
      en_US: specifying the format that the model must output
    required: false
    options:
      - text
      - json_object
pricing:
  input: '13'
  output: '54'
  unit: '0.000001'
  currency: RMB
