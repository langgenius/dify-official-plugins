# https://developers.openai.com/api/docs/models/gpt-5.5-pro
model: gpt-5.5-pro
label:
  zh_Hans: gpt-5.5-pro
  en_US: gpt-5.5-pro
model_type: llm
features:
  - multi-tool-call
  - agent-thought
  - vision
  - structured-output
model_properties:
  mode: chat
  context_size: 1050000
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    default: 8192
    min: 1
    max: 128000
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    help:
      zh_Hans: 指定模型必须输出的格式
      en_US: specifying the format that the model must output
    required: false
    options:
      - text
      - json_schema
  - name: json_schema
    use_template: json_schema
  - name: reasoning_effort
    label:
      zh_Hans: 推理努力程度
      en_US: Reasoning Effort
    type: string
    help:
      zh_Hans: 约束推理模型的推理努力程度。支持 medium、high 和 xhigh，默认值为 high。
      en_US: Constrains reasoning effort. Supported values are medium, high, and xhigh; the default is high.
    required: false
    default: high
    options:
      - medium
      - high
      - xhigh
  - name: verbosity
    label:
      zh_Hans: 详细程度
      en_US: Verbosity
    type: string
    help:
      zh_Hans: 约束模型响应的详细程度。较低的值将产生更简洁的响应，而较高的值将产生更详细的响应。支持的值包括 low、medium 和 high
      en_US: Constrains the verbosity of the model's response. Lower values will result in more concise responses, while higher values will result in more verbose responses. Currently supported values are low, medium, and high
    required: false
    default: medium
    options:
      - low
      - medium
      - high
  - name: service_tier
    label:
      zh_Hans: 服务层级
      en_US: Service tier
    type: string
    help:
      zh_Hans: Auto 跟随项目设置；Default 使用标准处理；Flex 使用成本更低但可能更慢的处理。
      en_US: Auto follows the project setting; Default selects standard processing; Flex selects lower-cost processing that may be slower.
    required: false
    default: auto
    options:
      - auto
      - default
      - flex
pricing:
  input: '30.00'
  output: '180.00'
  unit: '0.000001'
  currency: USD
