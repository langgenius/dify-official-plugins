# https://developers.openai.com/api/docs/models/gpt-5.1
model: gpt-5.1-2025-11-13
label:
  zh_Hans: gpt-5.1-2025-11-13
  en_US: gpt-5.1-2025-11-13
model_type: llm
features:
  - multi-tool-call
  - agent-thought
  - stream-tool-call
  - vision
  - structured-output
model_properties:
  mode: chat
  context_size: 400000
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    default: 8192
    min: 1
    max: 128000
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    help:
      zh_Hans: 指定模型必须输出的格式
      en_US: specifying the format that the model must output
    required: false
    options:
      - text
      - json_schema
  - name: json_schema
    use_template: json_schema
  - name: reasoning_effort
    label:
      zh_Hans: 推理努力程度
      en_US: Reasoning Effort
    type: string
    help:
      zh_Hans: 约束推理模型的推理努力程度。支持的值包括 none、low、medium 和 high。降低推理努力可以获得更快的响应和更少的推理 token 使用。GPT-5.1 中默认值为 none。
      en_US: Constrains effort on reasoning for reasoning models. Currently supported values are none, low, medium, and high. Reducing reasoning effort can result in faster responses and fewer tokens used on reasoning in a response. The default for GPT-5.1 is none.
    required: false
    default: none
    options:
      - none
      - low
      - medium
      - high
  - name: verbosity
    label:
      zh_Hans: 详细程度
      en_US: Verbosity
    type: string
    help:
      zh_Hans: 约束模型响应的详细程度。较低的值将产生更简洁的响应，而较高的值将产生更详细的响应。支持的值包括 low、medium 和 high
      en_US: Constrains the verbosity of the model's response. Lower values will result in more concise responses, while higher values will result in more verbose responses. Currently supported values are low, medium, and high
    required: false
    default: medium
    options:
      - low
      - medium
      - high
  - name: enable_stream
    label:
      zh_Hans: 流式响应
      en_US: Streaming
    type: boolean
    help:
      zh_Hans: 是否启用流式响应。
      en_US: Whether to enable streaming responses.
    required: true
    default: true
  - name: service_tier
    label:
      zh_Hans: 服务层级
      en_US: Service tier
    type: string
    help:
      zh_Hans: Auto 跟随项目设置；Default、Flex 和 Priority 分别使用标准、低成本和低延迟处理。
      en_US: Auto follows the project setting; Default, Flex, and Priority select standard, lower-cost, and lower-latency processing respectively.
    required: false
    default: auto
    options:
      - auto
      - default
      - flex
      - priority
pricing:
  input: '1.25'
  output: '10.00'
  unit: '0.000001'
  currency: USD
