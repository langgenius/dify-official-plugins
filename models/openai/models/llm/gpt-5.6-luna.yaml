# https://developers.openai.com/api/docs/models/gpt-5.6-luna
model: gpt-5.6-luna
label:
  zh_Hans: gpt-5.6-luna
  en_US: gpt-5.6-luna
model_type: llm
features:
  - multi-tool-call
  - agent-thought
  - stream-tool-call
  - vision
  - structured-output
model_properties:
  mode: chat
  context_size: 1050000
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    default: 8192
    min: 1
    max: 128000
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    help:
      zh_Hans: 指定模型必须输出的格式
      en_US: specifying the format that the model must output
    required: false
    options:
      - text
      - json_schema
  - name: json_schema
    use_template: json_schema
  - name: reasoning_effort
    label:
      zh_Hans: 推理努力程度
      en_US: Reasoning Effort
    type: string
    help:
      zh_Hans: GPT-5.6 支持 none、low、medium、high、xhigh 和 max，默认值为 medium。此插件默认使用 Responses API，以支持推理与函数工具组合使用。
      en_US: GPT-5.6 supports none, low, medium, high, xhigh, and max, defaulting to medium. This plugin defaults to the Responses API so reasoning works with function tools.
    required: false
    default: medium
    options:
      - none
      - low
      - medium
      - high
      - xhigh
      - max
  - name: reasoning_mode
    label:
      zh_Hans: 推理模式
      en_US: Reasoning Mode
    type: string
    help:
      zh_Hans: 标准模式平衡质量与延迟；Pro 模式会投入更多模型计算，仅适用于 Responses API。
      en_US: Standard mode balances quality and latency; Pro mode applies more model work and is available only with the Responses API.
    required: false
    default: standard
    options:
      - standard
      - pro
  - name: reasoning_context
    label:
      zh_Hans: 推理上下文
      en_US: Reasoning Context
    type: string
    help:
      zh_Hans: 控制当前请求可使用哪些已有推理项；all_turns 需要通过 previous_response_id、Conversation 或完整历史提供先前响应。
      en_US: Controls which available reasoning items the request can use; all_turns requires prior responses through previous_response_id, a Conversation, or complete replayed history.
    required: false
    default: auto
    options:
      - auto
      - current_turn
      - all_turns
  - name: reasoning_summary
    label:
      zh_Hans: 推理摘要
      en_US: Reasoning Summary
    type: string
    help:
      zh_Hans: 显式请求模型返回最详细的可用推理摘要；仅适用于 Responses API。
      en_US: Explicitly requests the most detailed available reasoning summary; available only with the Responses API.
    required: false
    options:
      - auto
  - name: verbosity
    label:
      zh_Hans: 详细程度
      en_US: Verbosity
    type: string
    help:
      zh_Hans: 约束模型响应的详细程度。较低的值将产生更简洁的响应，而较高的值将产生更详细的响应。支持的值包括 low、medium 和 high
      en_US: Constrains the verbosity of the model's response. Lower values will result in more concise responses, while higher values will result in more verbose responses. Currently supported values are low, medium, and high
    required: false
    default: medium
    options:
      - low
      - medium
      - high
  - name: enable_stream
    label:
      zh_Hans: 流式响应
      en_US: Streaming
    type: boolean
    help:
      zh_Hans: 是否启用流式响应。GPT-5.6 支持流式输出。
      en_US: Whether to enable streaming responses. GPT-5.6 supports streaming.
    required: true
    default: true
  - name: service_tier
    label:
      zh_Hans: 服务层级
      en_US: Service tier
    type: string
    help:
      zh_Hans: Auto 跟随项目设置；Default、Flex 和 Priority 分别使用标准、低成本和低延迟处理。
      en_US: Auto follows the project setting; Default, Flex, and Priority select standard, lower-cost, and lower-latency processing respectively.
    required: false
    default: auto
    options:
      - auto
      - default
      - flex
      - priority
# Base Standard pricing for direct API requests with up to 272K input tokens.
# Cached, cache-write, regional, and long-context rates are not representable by PriceConfig.
pricing:
  input: '1.00'
  output: '6.00'
  unit: '0.000001'
  currency: USD
