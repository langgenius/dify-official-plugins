# https://developers.openai.com/api/docs/models/gpt-5.2-pro
model: gpt-5.2-pro
label:
  zh_Hans: gpt-5.2-pro
  en_US: gpt-5.2-pro
model_type: llm
features:
  - multi-tool-call
  - agent-thought
  - stream-tool-call
  - vision
model_properties:
  mode: chat
  context_size: 400000
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    default: 8192
    min: 1
    max: 128000
  - name: reasoning_effort
    label:
      zh_Hans: 推理努力程度
      en_US: Reasoning Effort
    type: string
    help:
      zh_Hans: 约束推理模型的推理努力程度。支持 medium、high 和 xhigh。
      en_US: Constrains reasoning effort. Supported values are medium, high, and xhigh.
    required: false
    options:
      - medium
      - high
      - xhigh
  - name: verbosity
    label:
      zh_Hans: 详细程度
      en_US: Verbosity
    type: string
    help:
      zh_Hans: 约束模型响应的详细程度。较低的值将产生更简洁的响应，而较高的值将产生更详细的响应。支持的值包括 low、medium 和 high
      en_US: Constrains the verbosity of the model's response. Lower values will result in more concise responses, while higher values will result in more verbose responses. Currently supported values are low, medium, and high
    required: false
    default: medium
    options:
      - low
      - medium
      - high
  - name: enable_stream
    label:
      zh_Hans: 流式响应
      en_US: Streaming
    type: boolean
    help:
      zh_Hans: 是否启用流式响应。
      en_US: Whether to enable streaming responses.
    required: true
    default: true
  - name: service_tier
    label:
      zh_Hans: 服务层级
      en_US: Service tier
    type: string
    help:
      zh_Hans: Auto 跟随项目设置；Default 使用标准处理。
      en_US: Auto follows the project setting; Default selects standard processing.
    required: false
    default: auto
    options:
      - auto
      - default
pricing:
  input: '21.00'
  output: '168.00'
  unit: '0.000001'
  currency: USD
