# https://developers.openai.com/api/docs/models/gpt-audio-1.5
model: gpt-audio-1.5
label:
  zh_Hans: gpt-audio-1.5
  en_US: gpt-audio-1.5
model_type: llm
features:
  - multi-tool-call
  - agent-thought
  - stream-tool-call
  - audio
model_properties:
  mode: chat
  context_size: 128000
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: presence_penalty
    use_template: presence_penalty
  - name: frequency_penalty
    use_template: frequency_penalty
  - name: max_tokens
    use_template: max_tokens
    default: 512
    min: 1
    max: 16384
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    help:
      zh_Hans: 指定模型必须输出的格式
      en_US: Specifies the format the model must output
    required: false
    options:
      - text
      - json_object
# Text-token prices. Audio-token prices cannot be represented by PriceConfig.
pricing:
  input: '2.50'
  output: '10.00'
  unit: '0.000001'
  currency: USD
