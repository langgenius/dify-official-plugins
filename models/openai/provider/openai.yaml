provider: openai
label:
  en_US: OpenAI
description:
  en_US: Models provided by OpenAI, such as GPT-3.5-Turbo and GPT-4.
  zh_Hans: OpenAI 提供的模型，例如 GPT-3.5-Turbo 和 GPT-4。
icon_small:
  en_US: icon_s_en.svg
icon_large:
  en_US: icon_l_en.svg
background: "#E5E7EB"
help:
  title:
    en_US: Get your API Key from OpenAI
    zh_Hans: 从 OpenAI 获取 API Key
  url:
    en_US: https://platform.openai.com/account/api-keys
supported_model_types:
  - llm
  - text-embedding
  - speech2text
  - moderation
  - tts
configurate_methods:
  - predefined-model
  - customizable-model
model_credential_schema:
  model:
    label:
      en_US: Model Name
      zh_Hans: 模型名称
    placeholder:
      en_US: Enter your model name
      zh_Hans: 输入模型名称
  credential_form_schemas:
    - variable: openai_api_key
      label:
        en_US: API Key
      type: secret-input
      required: true
      placeholder:
        zh_Hans: 在此输入您的 API Key
        en_US: Enter your API Key
    - variable: openai_organization
      label:
        zh_Hans: 组织 ID
        en_US: Organization
      type: text-input
      required: false
      placeholder:
        zh_Hans: 在此输入您的组织 ID
        en_US: Enter your Organization ID
    - variable: openai_api_base
      label:
        zh_Hans: API Base
        en_US: API Base
      type: text-input
      required: false
      placeholder:
        zh_Hans: 在此输入您的 API Base
        en_US: Enter your API Base
    - variable: api_protocol
      label:
        zh_Hans: API 协议
        en_US: API Protocol
      type: select
      required: false
      default: chat
      options:
        - value: chat
          label:
            zh_Hans: Chat Completions
            en_US: Chat Completions
        - value: responses
          label:
            zh_Hans: Responses API
            en_US: Responses API
      help:
        zh_Hans: 选择该模型使用的 API 协议。Chat Completions 适用于大多数模型，Responses API 适用于 o3-pro、gpt-5.4 等模型。
        en_US: Select the API protocol for this model. Use Chat Completions for most models, Responses API for models like o3-pro and gpt-5.4.
    - variable: enable_request_metadata
      label:
        zh_Hans: 启用请求元数据（可选）
        en_US: Enable request metadata (optional)
      type: select
      required: false
      default: disabled
      options:
        - value: enabled
          label:
            zh_Hans: 已启用
            en_US: Enabled
        - value: disabled
          label:
            zh_Hans: 已禁用
            en_US: Disabled
      help:
        zh_Hans: 启用后，在 chat.completions.create 和 responses.create 调用中附加 dify_app_id 和 dify_source 作为 metadata，同时设置 store=true 以便 metadata 被记录到 Stored Completions（OpenAI API 要求：仅当 store 为 true 时才接受 metadata）。这意味着请求和响应会保存在您的 OpenAI 账户。可见性由您的 OpenAI Stored Completions 设置控制。默认禁用。
        en_US: "When enabled, attaches dify_app_id and dify_source as metadata on both chat.completions.create and responses.create, AND sets store=true so the metadata is recorded in Stored Completions (required by OpenAI API: metadata is only accepted when store is true). This means requests and responses are persisted on your OpenAI account; visibility is governed by your OpenAI Stored Completions setting. Default disabled. See: https://platform.openai.com/docs/api-reference/chat/create#chat-create-store"
provider_credential_schema:
  credential_form_schemas:
    - variable: openai_api_key
      label:
        en_US: API Key
      type: secret-input
      required: true
      placeholder:
        zh_Hans: 在此输入您的 API Key
        en_US: Enter your API Key
    - variable: openai_organization
      label:
        zh_Hans: 组织 ID
        en_US: Organization
      type: text-input
      required: false
      placeholder:
        zh_Hans: 在此输入您的组织 ID
        en_US: Enter your Organization ID
    - variable: openai_api_base
      label:
        zh_Hans: API Base
        en_US: API Base
      type: text-input
      required: false
      placeholder:
        zh_Hans: 在此输入您的 API Base, 如：https://api.openai.com
        en_US: Enter your API Base, e.g. https://api.openai.com
    - variable: validate_model
      label:
        zh_Hans: 验证模型
        en_US: Validate Model
      type: text-input
      required: false
      placeholder:
        zh_Hans: 用于验证凭据的模型名称，如：gpt-4o-mini
        en_US: Model name used to validate credentials, e.g. gpt-4o-mini
    - variable: api_protocol
      label:
        zh_Hans: API 协议
        en_US: API Protocol
      type: select
      required: false
      default: chat
      options:
        - value: chat
          label:
            zh_Hans: Chat Completions
            en_US: Chat Completions
        - value: responses
          label:
            zh_Hans: Responses API
            en_US: Responses API
      help:
        zh_Hans: 选择该 Provider 使用的 API 协议。Chat Completions 适用于大多数模型，Responses API 适用于 o3-pro、gpt-5 等模型。
        en_US: Select the API protocol for this provider. Use Chat Completions for most models, Responses API for models like o3-pro and gpt-5.
    - variable: enable_request_metadata
      label:
        zh_Hans: 启用请求元数据（可选）
        en_US: Enable request metadata (optional)
      type: select
      required: false
      default: disabled
      options:
        - value: enabled
          label:
            zh_Hans: 已启用
            en_US: Enabled
        - value: disabled
          label:
            zh_Hans: 已禁用
            en_US: Disabled
      help:
        zh_Hans: 启用后，在 chat.completions.create 和 responses.create 调用中附加 dify_app_id 和 dify_source 作为 metadata，同时设置 store=true 以便 metadata 被记录到 Stored Completions（OpenAI API 要求：仅当 store 为 true 时才接受 metadata）。这意味着请求和响应会保存在您的 OpenAI 账户。可见性由您的 OpenAI Stored Completions 设置控制。默认禁用。
        en_US: "When enabled, attaches dify_app_id and dify_source as metadata on both chat.completions.create and responses.create, AND sets store=true so the metadata is recorded in Stored Completions (required by OpenAI API: metadata is only accepted when store is true). This means requests and responses are persisted on your OpenAI account; visibility is governed by your OpenAI Stored Completions setting. Default disabled. See: https://platform.openai.com/docs/api-reference/chat/create#chat-create-store"
models:
  llm:
    predefined:
      - "models/llm/*.yaml"
    position: "models/llm/_position.yaml"
  text_embedding:
    predefined:
      - "models/text_embedding/*.yaml"
  tts:
    predefined:
      - "models/tts/*.yaml"
  speech2text:
    predefined:
      - "models/speech2text/*.yaml"
  moderation:
    predefined:
      - "models/moderation/*.yaml"
extra:
  python:
    provider_source: provider/openai.py
    model_sources:
      - "models/llm/llm.py"
      - "models/text_embedding/text_embedding.py"
      - "models/speech2text/speech2text.py"
      - "models/moderation/moderation.py"
      - "models/tts/tts.py"
