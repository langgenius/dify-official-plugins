[project]
name = "dify-openai"
version = "1.0.0"
description = "OpenAI models for Dify"
readme = "README.md"
requires-python = ">=3.12"

# Managed with uv; refresh the lockfile with `uv lock`.
dependencies = [
    "dify_plugin>=0.9.0",
    "openai>=2.45.0",
    "tiktoken>=0.13.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-mock>=3.15.1",
]

[tool.pytest.ini_options]
markers = [
    "live: sends billable requests to the real OpenAI API",
]
