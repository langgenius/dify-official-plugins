model: qwen/qwen3.6-plus:free
label:
  en_US: qwen3.6-plus (free)
model_type: llm
features:
  - agent-thought
  - tool-call
  - multi-tool-call
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 1000000
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: max_tokens
    use_template: max_tokens
    default: 4096
    min: 1
    max: 65536
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    help:
      zh_Hans: 指定模型必须输出的格式
      en_US: specifying the format that the model must output
    required: false
    options:
      - text
      - json_object
  - name: enable_thinking
    label:
      zh_Hans: 开启思考模式
      en_US: Enable thinking mode
    type: boolean
    default: true
    help:
      zh_Hans: 是否开启默认思考模式
      en_US: Whether to enable the default thinking mode
    required: false
  - name: exclude_reasoning_tokens
    label:
      zh_Hans: 隐藏思考过程
      en_US: Hide the thought process
    type: boolean
    default: true
    help:
      zh_Hans: 是否隐藏思考过程。
      en_US: Whether to hide the thought process.
    required: false
pricing:
  input: "0"
  output: "0"
  unit: "0.000001"
  currency: USD
