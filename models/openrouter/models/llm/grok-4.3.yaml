model: x-ai/grok-4.3
label:
  en_US: Grok 4.3
model_type: llm
features:
  - multi-tool-call
  - agent-thought
  - stream-tool-call
  - vision
model_properties:
  mode: chat
  context_size: 1048576
parameter_rules:
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    help:
      zh_Hans: 指定模型必须输出的格式
      en_US: specifying the format that the model must output
    required: false
    options:
      - text
      - json_object
      - json_schema
  - name: json_schema
    use_template: json_schema
  - name: enable_thinking
    label:
      zh_Hans: 开启思考模式
      en_US: Enable thinking mode
    type: boolean
    default: true
    help:
      zh_Hans: 是否开启默认思考模式
      en_US: Whether to enable the default thinking mode
    required: false
  - name: reasoning_effort
    label:
      zh_Hans: 推理程度
      en_US: Reasoning Effort
    type: string
    help:
      zh_Hans: 指定模型推理的难度
      en_US: specifying the difficulty of the model's reasoning
    required: false
    options:
      - high
      - medium
      - low
  - name: exclude_reasoning_tokens
    label:
      zh_Hans: 隐藏思考过程
      en_US: Hide the thought process
    type: boolean
    default: true
    help:
      zh_Hans: 是否隐藏思考过程。
      en_US: Whether to hide the thought process.
    required: false
pricing:
  input: "1.25"
  output: "2.5"
  unit: "0.000001"
  currency: USD
