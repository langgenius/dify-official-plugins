[project]
name = "orcarouter"
version = "0.1.0"
description = "OrcaRouter — OpenAI-compatible LLM gateway routing across 40+ providers"
readme = "README.md"
requires-python = ">=3.12"

dependencies = [
    "dify_plugin>=0.5.0,<0.6.0",
    "pydantic>=2.11.0",
    "requests>=2.32.0",
    "sniffio>=1.3.1",
]

[dependency-groups]
dev = [
    "pyrefly>=0.50.0",
    "pytest>=9.0.2",
    "pyyaml>=6.0.0",
    "black>=25.11.0",
    "ruff>=0.14.6",
]
