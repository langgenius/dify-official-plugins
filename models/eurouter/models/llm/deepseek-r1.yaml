model: deepseek-r1
label:
  en_US: DeepSeek R1
model_type: llm
features:
  - agent-thought
model_properties:
  mode: chat
  context_size: 65536
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: max_tokens
    use_template: max_tokens
    default: 4096
    min: 1
    max: 32768
  - name: response_format
    use_template: response_format
