model: minimax-m3
label:
  en_US: MiniMax-M3
model_type: llm
features:
  - agent-thought
  - vision
  - video
  - tool-call
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 1000000
parameter_rules:
  - name: temperature
    use_template: temperature
    min: 0
    max: 2
    default: 1
  - name: top_p
    use_template: top_p
    min: 0
    max: 1
    default: 0.95
  - name: max_tokens
    use_template: max_tokens
    required: true
    default: 10240
    min: 1
    max: 524288
  - name: thinking
    label:
      en_US: Thinking Mode
      zh_Hans: 思考模式
    type: string
    default: adaptive
    required: false
    help:
      en_US: Enables adaptive thinking for MiniMax-M3.
      zh_Hans: 启用 MiniMax-M3 自适应思考。
    options:
      - adaptive
# Official pricing is tiered; this flat estimate uses the standard <=512k input-token tier.
pricing:
  input: "4.2"
  output: "16.8"
  unit: "0.000001"
  currency: RMB
