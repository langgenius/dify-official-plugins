model: mimo-v2-5
label:
  en_US: MiMo V2.5
model_type: llm
features:
  - vision
  - video
  - audio
model_properties:
  mode: chat
  context_size: 1000000
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: max_tokens
    use_template: max_tokens
    type: int
    default: 1024
    min: 1
    max: 128000
  - name: frequency_penalty
    use_template: frequency_penalty
  - name: presence_penalty
    use_template: presence_penalty
  - name: response_format
    label:
      en_US: Response Format
    type: string
    required: false
    options:
      - text
      - json_object
pricing:
  input: '0.7'
  output: '1.4'
  unit: '0.000001'
  currency: USD
