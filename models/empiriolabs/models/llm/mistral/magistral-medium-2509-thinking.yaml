model: magistral-medium-2509-thinking
label:
  en_US: Magistral Medium 2509 Thinking
model_type: llm
model_properties:
  mode: chat
  context_size: 40000
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: max_tokens
    use_template: max_tokens
    type: int
    default: 1024
    min: 1
    max: 40000
  - name: frequency_penalty
    use_template: frequency_penalty
  - name: presence_penalty
    use_template: presence_penalty
  - name: response_format
    label:
      en_US: Response Format
    type: string
    required: false
    options:
      - text
      - json_object
pricing:
  input: '2.6'
  output: '6.5'
  unit: '0.000001'
  currency: USD
