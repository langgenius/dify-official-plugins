model: nova-premier-1-0
label:
  en_US: Nova Premier 1.0
model_type: llm
features:
  - vision
  - video
model_properties:
  mode: chat
  context_size: 1000000
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: max_tokens
    use_template: max_tokens
    type: int
    default: 1024
    min: 1
    max: 32000
  - name: frequency_penalty
    use_template: frequency_penalty
  - name: presence_penalty
    use_template: presence_penalty
  - name: response_format
    label:
      en_US: Response Format
    type: string
    required: false
    options:
      - text
      - json_object
pricing:
  input: '3'
  output: '15'
  unit: '0.000001'
  currency: USD
