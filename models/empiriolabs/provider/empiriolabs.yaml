identity:
  author: langgenius
  name: empiriolabs
  label:
    en_US: EmpirioLabs
    zh_Hans: EmpirioLabs
    ja_JP: EmpirioLabs
    pt_BR: EmpirioLabs
  description:
    en_US: Frontier AI models through one OpenAI-compatible API.
    zh_Hans: 通过一个兼容 OpenAI 的 API 访问前沿 AI 模型。
    ja_JP: 1つのOpenAI互換APIで最先端のAIモデルを利用。
    pt_BR: Modelos de IA de ponta por meio de uma API compatível com OpenAI.
  icon: empiriolabs_small.png
background: "#0A2E8C"
configurate_methods:
  - predefined-model
  - customizable-model
extra:
  python:
    source: provider/empiriolabs.py
    provider_source: provider/empiriolabs.py
    model_sources:
      - "models/llm/llm.py"
      - "models/text_embedding/text_embedding.py"
help:
  title:
    en_US: Get your API key from EmpirioLabs
    zh_Hans: 从 EmpirioLabs 获取 API Key
    ja_JP: EmpirioLabs から API キーを取得
    pt_BR: Obtenha sua chave de API da EmpirioLabs
  url:
    en_US: https://platform.empiriolabs.ai/dashboard/api-keys
    zh_Hans: https://platform.empiriolabs.ai/dashboard/api-keys
    ja_JP: https://platform.empiriolabs.ai/dashboard/api-keys
    pt_BR: https://platform.empiriolabs.ai/dashboard/api-keys
supported_model_types:
  - llm
  - text-embedding
icon_large:
  en_US: empiriolabs_large.png
  zh_Hans: empiriolabs_large.png
  ja_JP: empiriolabs_large.png
  pt_BR: empiriolabs_large.png
icon_small:
  en_US: empiriolabs_small.png
  zh_Hans: empiriolabs_small.png
  ja_JP: empiriolabs_small.png
  pt_BR: empiriolabs_small.png
label:
  en_US: EmpirioLabs
  zh_Hans: EmpirioLabs
  ja_JP: EmpirioLabs
  pt_BR: EmpirioLabs
model_credential_schema:
  credential_form_schemas:
    - variable: api_key
      label:
        en_US: API Key
        zh_Hans: API 密钥
        ja_JP: API キー
        pt_BR: Chave da API
      type: secret-input
      required: true
      placeholder:
        en_US: Enter your API Key
        zh_Hans: 在此输入您的 API Key
        ja_JP: API キーを入力してください
        pt_BR: Digite sua chave de API
    - variable: mode
      label:
        en_US: Completion mode
        zh_Hans: 完成模式
        ja_JP: 完了モード
        pt_BR: Modo de conclusão
      type: select
      required: false
      default: chat
      options:
        - label:
            en_US: Completion
            zh_Hans: 补全
            ja_JP: 完了
            pt_BR: Conclusão
          value: completion
        - label:
            en_US: Chat
            zh_Hans: 对话
            ja_JP: チャット
            pt_BR: Chat
          value: chat
      placeholder:
        en_US: Select completion mode
        zh_Hans: 选择对话类型
        ja_JP: 完了モードを選択
        pt_BR: Selecione o modo de conclusão
      show_on:
        - variable: __model_type
          value: llm
  model:
    label:
      en_US: Model Name
      zh_Hans: 模型名称
      ja_JP: モデル名
      pt_BR: Nome do Modelo
    placeholder:
      en_US: Enter full model name
      zh_Hans: 输入模型全称
      ja_JP: 完全なモデル名を入力
      pt_BR: Digite o nome completo do modelo
models:
  llm:
    position: models/llm/_position.yaml
    predefined:
      - models/llm/alibaba/*.yaml
      - models/llm/deepseek/*.yaml
      - models/llm/zhipu/*.yaml
      - models/llm/moonshot/*.yaml
      - models/llm/minimax/*.yaml
  text_embedding:
    predefined:
      - "models/text_embedding/*.yaml"
provider: empiriolabs
provider_credential_schema:
  credential_form_schemas:
    - variable: api_key
      label:
        en_US: API Key
        zh_Hans: API 密钥
        ja_JP: API キー
        pt_BR: Chave da API
      type: secret-input
      required: true
      placeholder:
        en_US: Enter your API Key
        zh_Hans: 在此输入您的 API Key
        ja_JP: API キーを入力してください
        pt_BR: Digite sua chave de API
