model: mistralai/Mistral-Large-Instruct-2411
label:
  en_US: Mistral Large Instruct 2411
model_type: llm
features:
  - agent-thought
  - vision
  - tool-call
  - multi-tool-call
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 128000
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: max_tokens
    use_template: max_tokens
    default: 4096
    min: 1
    max: 16384
pricing:
  input: '2.00'
  output: '6.00'
  unit: '0.000001'
  currency: USD
