model: meta-llama/Llama-3.2-90B-Vision-Instruct
label:
  en_US: Llama 3.2 90B Vision Instruct
model_type: llm
features:
  - agent-thought
  - vision
model_properties:
  mode: chat
  context_size: 16000
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: max_tokens
    use_template: max_tokens
    default: 4096
    min: 1
    max: 8192
pricing:
  input: '0.35'
  output: '0.40'
  unit: '0.000001'
  currency: USD
