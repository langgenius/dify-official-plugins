model: mistralai/Mistral-Nemo-Instruct-2407
label:
  en_US: Mistral Nemo Instruct 2407
model_type: llm
features:
  - agent-thought
  - tool-call
  - multi-tool-call
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 128000
parameter_rules:
