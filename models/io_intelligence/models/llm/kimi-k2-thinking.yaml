model: moonshotai/Kimi-K2-Thinking
label:
  en_US: Kimi K2 Thinking
model_type: llm
features:
  - agent-thought
model_properties:
  mode: chat
  context_size: 262144
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: max_tokens
    use_template: max_tokens
    default: 4096
    min: 1
    max: 16384
pricing:
  input: '0.32'
  output: '0.48'
  unit: '0.000001'
  currency: USD
