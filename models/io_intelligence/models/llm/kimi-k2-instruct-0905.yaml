model: moonshotai/Kimi-K2-Instruct-0905
label:
  en_US: Kimi K2 Instruct 0905
model_type: llm
features:
  - agent-thought
  - tool-call
  - multi-tool-call
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 262144
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: max_tokens
    use_template: max_tokens
    default: 4096
    min: 1
    max: 16384
pricing:
  input: '0.39'
  output: '1.90'
  unit: '0.000001'
  currency: USD
