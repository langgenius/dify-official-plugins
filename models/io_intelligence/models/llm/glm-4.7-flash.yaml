model: zai-org/GLM-4.7-Flash
label:
  en_US: GLM 4.7 Flash
model_type: llm
features:
  - agent-thought
  - tool-call
  - multi-tool-call
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 200000
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: max_tokens
    use_template: max_tokens
    default: 4096
    min: 1
    max: 16384
pricing:
  input: '0.07'
  output: '0.40'
  unit: '0.000001'
  currency: USD
