model: claude-opus-4-7
label:
  en_US: Claude Opus 4-7
model_type: llm
features:
  - agent-thought
  - tool-call
  - multi-tool-call
  - stream-tool-call
  - vision
model_properties:
  mode: chat
  context_size: 200000
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: max_tokens
    use_template: max_tokens
    type: int
    default: 4096
    min: 1
    max: 32000
  - name: top_p
    use_template: top_p
pricing:
  input: "5.00"
  output: "25.00"
  unit: "0.000001"
  currency: USD
