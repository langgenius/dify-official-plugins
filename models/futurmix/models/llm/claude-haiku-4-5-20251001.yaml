model: claude-haiku-4-5-20251001
label:
  en_US: Claude Haiku 4.5
model_type: llm
features:
  - agent-thought
  - tool-call
  - multi-tool-call
  - stream-tool-call
  - vision
model_properties:
  mode: chat
  context_size: 200000
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: max_tokens
    use_template: max_tokens
    type: int
    default: 4096
    min: 1
    max: 8192
  - name: top_p
    use_template: top_p
pricing:
  input: "1.00"
  output: "5.00"
  unit: "0.000001"
  currency: USD
