model: gemini-2.5-pro
label:
  en_US: Gemini 2.5 Pro
model_type: llm
features:
  - agent-thought
  - tool-call
  - multi-tool-call
  - stream-tool-call
  - vision
model_properties:
  mode: chat
  context_size: 1048576
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: max_tokens
    use_template: max_tokens
    type: int
    default: 8192
    min: 1
    max: 65536
  - name: top_p
    use_template: top_p
pricing:
  input: "1.25"
  output: "10.00"
  unit: "0.000001"
  currency: USD
