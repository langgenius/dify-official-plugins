model: qwen3.5-plus
label:
  en_US: Qwen3.5 Plus
model_type: llm
features:
  - agent-thought
  - tool-call
  - stream-tool-call
  - multi-tool-call
  - vision
  - video
model_properties:
  mode: chat
  context_size: 991000
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: max_tokens
    use_template: max_tokens
    default: 8192
    min: 1
    max: 64000
  - name: enable_thinking
    required: false
    type: boolean
    default: false
    label:
      zh_Hans: 思考模式
      en_US: Thinking mode
    help:
      zh_Hans: 是否开启思考模式。
      en_US: Whether to enable thinking mode.
  - name: thinking_budget
    required: false
    type: int
    default: 2048
    min: 1
    max: 81920
    label:
      zh_Hans: 思考长度限制
      en_US: Thinking budget
    help:
      zh_Hans: 思考过程的最大长度，只在思考模式为 true 时生效。
      en_US: The maximum length of the thinking process, only effective when thinking mode is true.
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    required: false
    options:
      - text
      - json_object
      - json_schema
  - name: json_schema
    use_template: json_schema
pricing:
  input: '0.1096'
  output: '0.6576'
  unit: '0.000001'
  currency: USD
