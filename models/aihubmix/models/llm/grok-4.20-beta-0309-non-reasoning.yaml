model: grok-4.20-beta-0309-non-reasoning
label:
  en_US: grok-4.20-beta-latest-non-reasoning
model_type: llm
features:
  - vision
  - agent-thought
  - tool-call
  - multi-tool-call
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 2000000
parameter_rules:
  - name: temperature
    use_template: temperature
    default: 1.0
    min: 0.0
    max: 2.0
  - name: top_p
    use_template: top_p
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    help:
      zh_Hans: 指定模型必须输出的格式
      en_US: specifying the format that the model must output
    required: false
    options:
      - json_object
      - json_schema
  - name: json_schema
    use_template: json_schema
  - name: search_parameters
    label:
      zh_Hans: 联网搜索参数
      en_US: Live Search Parameters
    type: text
    default: "{\n  \"mode\": \"auto\"\n}"
    help:
      zh_Hans: 联网搜索的 JSON 参数，支持 mode、max_search_results、return_citations、sources、from_date 和 to_date，详见 https://docs.x.ai/developers/rest-api-reference/inference/chat
      en_US: JSON parameters for live search. Supported keys include mode, max_search_results, return_citations, sources, from_date, and to_date. See https://docs.x.ai/developers/rest-api-reference/inference/chat
    required: false
pricing:
  input: '2'
  output: '6'
  unit: '0.000001'
  currency: USD
