model: kimi-k3
label:
  en_US: Kimi K3
model_type: llm
features:
  - agent-thought
  - tool-call
  - stream-tool-call
  - multi-tool-call
  - vision
  - video
model_properties:
  mode: chat
  context_size: 1048576
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    default: 8192
    min: 1
    max: 1048576
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    required: false
    options:
      - text
      - json_object
      - json_schema
  - name: json_schema
    use_template: json_schema
pricing:
  input: '3'
  output: '15'
  unit: '0.000001'
  currency: USD
