model: kimi-k3
label:
  zh_Hans: Kimi K3
  en_US: Kimi K3
model_type: llm
features:
  - vision
  - video
  - structured-output
  - agent-thought
  - tool-call
  - multi-tool-call
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 1048576
parameter_rules:
  - name: max_completion_tokens
    use_template: max_tokens
    default: 131072
    min: 1
    max: 1048576
  - name: reasoning_effort
    label:
      zh_Hans: 推理强度
      en_US: Reasoning Effort
    type: string
    required: false
    default: max
    options:
      - max
    help:
      zh_Hans: Kimi K3 默认启用最大推理强度。
      en_US: Kimi K3 uses always-on maximum reasoning.
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    required: false
    options:
      - text
      - json_object
      - json_schema
  - name: json_schema
    use_template: json_schema
pricing:
  input: '3'
  output: '15'
  unit: '0.000001'
  currency: USD
