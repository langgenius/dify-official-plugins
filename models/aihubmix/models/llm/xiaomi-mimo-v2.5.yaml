model: xiaomi-mimo-v2.5
label:
  en_US: Xiaomi Mimo V2.5
model_type: llm
features:
  - vision
  - audio
  - video
model_properties:
  mode: chat
  context_size: 256000
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: max_tokens
    use_template: max_tokens
    default: 4096
    min: 1
    max: 4096
  - name: response_format
    label:
      en_US: Response Format
    type: string
    required: false
    options:
      - text
      - json_object
      - json_schema
  - name: json_schema
    use_template: json_schema
  - name: reasoning_effort
    label:
      en_US: Reasoning Effort
    type: string
    required: false
    default: high
    options:
      - none
      - high
    help:
      en_US: Controls the model thinking capability. none disables thinking; high enables it.
pricing:
  input: '0.155'
  output: '0.31'
  unit: '0.000001'
  currency: USD
