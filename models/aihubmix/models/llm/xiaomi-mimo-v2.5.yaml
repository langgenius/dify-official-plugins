model: xiaomi-mimo-v2.5
label:
  en_US: Xiaomi Mimo V2.5
model_type: llm
features:
  - vision
  - audio
  - video
model_properties:
  mode: chat
  context_size: 256000
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: max_tokens
    use_template: max_tokens
    default: 4096
    min: 1
    max: 4096
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    required: false
    options:
      - text
      - json_object
      - json_schema
  - name: json_schema
    use_template: json_schema
  - name: reasoning_effort
    label:
      zh_Hans: 推理强度
      en_US: Reasoning Effort
    type: string
    required: false
    default: high
    options:
      - none
      - high
    help:
      zh_Hans: 控制模型的思考能力。none 关闭思考，其他档位开启思考。
      en_US: Controls the model's thinking capability. none disables thinking, other levels enable thinking.
pricing:
  input: '0.44'
  output: '2.2'
  unit: '0.000001'
  currency: USD
