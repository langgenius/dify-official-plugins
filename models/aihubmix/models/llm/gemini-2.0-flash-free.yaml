model: gemini-2.0-flash-free
label:
  en_US: Gemini 2.0 Flash (free)
model_type: llm
features:
  - agent-thought
  - tool-call
  - stream-tool-call
  - multi-tool-call
  - vision
  - audio
  - video
model_properties:
  mode: chat
  context_size: 1048576
parameter_rules:
  - name: temperature
    use_template: temperature
    default: 1
    min: 0
    max: 2
  - name: top_p
    use_template: top_p
  - name: max_output_tokens
    use_template: max_tokens
    default: 8192
    min: 1
    max: 8192
  - name: json_schema
    use_template: json_schema
  - name: grounding
    label:
      en_US: Grounding
      zh_Hans: 事实核查
      ja_JP: 事実チェック
    type: boolean
    required: true
    default: false
    help:
      en_US: Grounding with Google Search
      zh_Hans: Google 事实核查
      ja_JP: Google 検索に基づいた応答をします。
pricing:
  input: '0'
  output: '0'
  unit: '0.000001'
  currency: USD
