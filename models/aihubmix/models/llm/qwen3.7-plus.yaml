model: qwen3.7-plus
label:
  en_US: Qwen3.7 Plus
model_type: llm
features:
  - agent-thought
  - tool-call
  - stream-tool-call
  - multi-tool-call
  - vision
  - video
model_properties:
  mode: chat
  context_size: 1014784
parameter_rules:
  - name: enable_thinking
    required: false
    type: boolean
    default: false
    label:
      zh_Hans: 深度思考
      en_US: Deep Thinking
    help:
      zh_Hans: 是否开启深度思考模式，开启后模型会先进行推理再给出回答。
      en_US: Whether to enable deep thinking mode. When enabled, the model will reason before answering.
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    required: false
    options:
      - text
      - json_object
      - json_schema
  - name: json_schema
    use_template: json_schema
pricing:
  input: '2'
  output: '8'
  unit: '0.000001'
  currency: RMB
