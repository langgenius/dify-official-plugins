model: gpt-5-6-terra
label:
  en_US: GPT-5.6 Terra
icon: icon_s_en.svg
model_type: llm
features:
  - vision
model_properties:
  mode: chat
  context_size: 272000
parameter_rules:
  - name: max_tokens
    use_template: max_tokens
    required: true
    label:
      zh_Hans: 最大token数
      en_US: Max Tokens
    type: int
    default: 4096
    min: 1
    max: 272000
    help:
      zh_Hans: 停止前生成的最大令牌数。
      en_US: The maximum number of tokens to generate before stopping.
  - name: temperature
    use_template: temperature
    required: false
    label:
      zh_Hans: 模型温度
      en_US: Model Temperature
    type: float
    default: 1
    min: 0.0
    max: 1.0
    help:
      zh_Hans: 生成内容的随机性。
      en_US: The amount of randomness injected into the response.
  - name: top_p
    use_template: top_p
    label:
      zh_Hans: Top P
      en_US: Top P
    required: false
    type: float
    default: 0.999
    min: 0.000
    max: 1.000
    help:
      zh_Hans: 在核采样中的概率阈值。
      en_US: The probability threshold in nucleus sampling.
pricing:
  input: '0.00275'
  output: '0.0165'
  unit: '0.001'
  currency: USD
