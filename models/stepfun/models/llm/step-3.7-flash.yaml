model: step-3.7-flash
label:
  zh_Hans: Step 3.7 Flash
  en_US: Step 3.7 Flash
model_type: llm
features:
  - agent-thought
  - tool-call
  - multi-tool-call
  - stream-tool-call
  - vision
  - video
model_properties:
  mode: chat
  context_size: 256000
parameter_rules:
  - name: temperature
    use_template: temperature
    type: float
    default: 0.5
    min: 0.0
    max: 2.0
  - name: top_p
    use_template: top_p
    type: float
    default: 0.9
    min: 0.0
    max: 1.0
  - name: max_tokens
    use_template: max_tokens
    type: int
    default: 4096
    min: 1
    max: 256000
  - name: reasoning_effort
    label:
      zh_Hans: 推理强度
      en_US: Reasoning Effort
    type: string
    required: false
    default: medium
    options:
      - low
      - medium
      - high
    help:
      zh_Hans: 根据任务复杂度选择推理强度。medium 为默认推荐档位。
      en_US: Select reasoning effort based on task complexity. Medium is recommended by default.
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    required: false
    options:
      - text
      - json_object
      - json_schema
  - name: json_schema
    use_template: json_schema
pricing:
  input: '1.35'
  output: '8.1'
  unit: '0.000001'
  currency: RMB
