name: Require PR Approval

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - main
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  approval:
    name: Require PR Approval
    if: github.event.pull_request.base.ref == 'main'
    runs-on: depot-ubuntu-24.04
    steps:
      - name: Verify PR approval
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            if (!pr) {
              core.setFailed('This workflow must run from a pull request event.');
              return;
            }

            if (pr.draft) {
              core.setFailed('Draft pull requests cannot be merged.');
              return;
            }

            const {owner, repo} = context.repo;
            const pull_number = pr.number;

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            if (commits.length === 0) {
              core.setFailed(`Pull request #${pull_number} has no commits.`);
              return;
            }

            const latestCommit = commits[commits.length - 1];
            const latestCommitDate =
              latestCommit.commit.committer?.date ||
              latestCommit.commit.author?.date;
            const latestCommitTime = new Date(latestCommitDate).getTime();

            if (!Number.isFinite(latestCommitTime)) {
              core.setFailed(`Unable to determine timestamp for ${latestCommit.sha}.`);
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const latestReviewByUser = new Map();
            for (const review of reviews) {
              if (!review.user?.login || !review.submitted_at) {
                continue;
              }

              const current = latestReviewByUser.get(review.user.login);
              if (!current || new Date(review.submitted_at) > new Date(current.submitted_at)) {
                latestReviewByUser.set(review.user.login, review);
              }
            }

            const approvals = [...latestReviewByUser.values()].filter((review) => {
              if (review.state !== 'APPROVED') {
                return false;
              }

              if (review.user.login === pr.user.login) {
                return false;
              }

              return new Date(review.submitted_at).getTime() >= latestCommitTime;
            });

            if (approvals.length === 0) {
              core.setFailed(
                `PR #${pull_number} requires at least one approval after latest commit ${latestCommit.sha}.`
              );
              return;
            }

            core.info(
              `PR #${pull_number} approved by ${approvals.map((review) => review.user.login).join(', ')}.`
            );
