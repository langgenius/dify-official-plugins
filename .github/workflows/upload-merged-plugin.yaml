name: Upload Merged Plugin

on:
  push:
    branches:
      - main
    paths:
      - "agent-strategies/**"
      - "datasources/**"
      - "extensions/**"
      - "models/**"
      - "tools/**"
      - "triggers/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: depot-ubuntu-24.04
    permissions:
      actions: read
      contents: read
    outputs:
      plugins: ${{ steps.filter.outputs.plugins }}
      has_changes: ${{ steps.filter.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: base-sha
        name: Resolve base SHA from last successful run
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_SHA: ${{ github.sha }}
          FALLBACK_SHA: ${{ github.event.before }}
        run: |
          LAST_SUCCESS_SHA=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/upload-merged-plugin.yaml/runs?status=success&branch=${{ github.ref_name }}&per_page=10" \
            | jq -r --arg current "$CURRENT_SHA" \
              '[.workflow_runs[] | select(.head_sha != $current)] | first | .head_sha // empty' \
            2>/dev/null || true)

          if [ -n "$LAST_SUCCESS_SHA" ]; then
            echo "base_sha=$LAST_SUCCESS_SHA" >> "$GITHUB_OUTPUT"
            echo "Using last successful run SHA: $LAST_SUCCESS_SHA"
          else
            echo "base_sha=$FALLBACK_SHA" >> "$GITHUB_OUTPUT"
            echo "No prior successful run found; falling back to github.event.before: $FALLBACK_SHA"
          fi

      - id: filter
        name: Detect changed plugins
        env:
          BASE_SHA: ${{ steps.base-sha.outputs.base_sha }}
          HEAD_SHA: ${{ github.sha }}
        run: .github/scripts/detect-changed-plugins.sh

  upload-merged-plugin:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: depot-ubuntu-24.04-4
    strategy:
      matrix:
        plugin_path: ${{ fromJson(needs.detect-changes.outputs.plugins) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Resolve external tool versions
        id: external
        env:
          GH_TOKEN: ${{ secrets.ORG_SCOPE_GITHUB_TOKEN }}
        run: |
          echo "toolkit_sha=$(gh api repos/langgenius/dify-marketplace-toolkit/commits/HEAD --jq .sha)" >> $GITHUB_OUTPUT
          echo "cli_tag=$(gh release view -R langgenius/dify-plugin-daemon --json tagName --jq .tagName)" >> $GITHUB_OUTPUT

      - name: Cache .scripts (toolkit + CLI)
        id: scripts-cache
        uses: actions/cache@v4
        with:
          path: .scripts
          key: scripts-${{ steps.external.outputs.toolkit_sha }}-${{ steps.external.outputs.cli_tag }}

      - name: Clone Marketplace Toolkit
        if: steps.scripts-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.ORG_SCOPE_GITHUB_TOKEN }}
        run: |
          gh repo clone langgenius/dify-marketplace-toolkit -- .scripts/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12.7

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          activate-environment: false
          enable-cache: true
          cache-dependency-glob: |
            ${{ matrix.plugin_path }}/uv.lock
            ${{ matrix.plugin_path }}/requirements.txt

      - name: Download Dify CLI
        if: steps.scripts-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.ORG_SCOPE_GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.external.outputs.cli_tag }}" -R langgenius/dify-plugin-daemon --pattern "dify-plugin-linux-amd64" --dir .scripts
          chmod +x .scripts/dify-plugin-linux-amd64
          mv .scripts/dify-plugin-linux-amd64 .scripts/dify

      - name: Validate Dependencies
        run: |
          cd "${{ matrix.plugin_path }}"

          if [ -f "uv.lock" ]; then
            VENV_DIR="$RUNNER_TEMP/plugin-dependency-check-venv"

            cleanup() {
              rm -rf "$VENV_DIR"
            }
            trap cleanup EXIT

            rm -rf "$VENV_DIR"
            UV_PROJECT_ENVIRONMENT="$VENV_DIR" uv sync --all-groups --frozen --python 3.12
          elif [ -f "requirements.txt" ]; then
            VENV_DIR=".ci-requirements-check-venv"

            cleanup() {
              rm -rf "$VENV_DIR"
            }
            trap cleanup EXIT

            rm -rf "$VENV_DIR"
            uv venv "$VENV_DIR" --python 3.12
            uv pip install --python "$VENV_DIR/bin/python" -r requirements.txt
          else
            echo "!!! uv.lock or requirements.txt is required for dependency validation"
            exit 1
          fi

      - name: Generate Legacy Requirements for Packaging
        run: |
          bash .github/scripts/export-legacy-requirements.sh "${{ matrix.plugin_path }}"

      - name: Upload Plugin
        run: |
          uv run --with requests --with dify_plugin python .scripts/uploader/upload-package.py -d "${{ matrix.plugin_path }}" -t "${{ secrets.MARKETPLACE_TOKEN }}" --plugin-daemon-path .scripts/dify -u "${{ secrets.MARKETPLACE_BASE_URL }}" -f
