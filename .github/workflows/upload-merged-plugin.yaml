name: Upload Merged Plugin

on:
  push:
    branches:
      - main
    paths:
      - "agent-strategies/**"
      - "datasources/**"
      - "extensions/**"
      - "models/**"
      - "tools/**"
      - "triggers/**"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.filter.outputs.plugins }}
      has_changes: ${{ steps.filter.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        name: Detect changed plugins
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: .github/scripts/detect-changed-plugins.sh

  upload-merged-plugin:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin_path: ${{ fromJson(needs.detect-changes.outputs.plugins) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Clone Marketplace Toolkit
        env:
          GH_TOKEN: ${{ secrets.ORG_SCOPE_GITHUB_TOKEN }}
        run: |
          gh repo clone langgenius/dify-marketplace-toolkit -- .scripts/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12.7

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          activate-environment: false

      - name: Download Dify CLI
        env:
          GH_TOKEN: ${{ secrets.ORG_SCOPE_GITHUB_TOKEN }}
        run: |
          gh release download -R langgenius/dify-plugin-daemon --pattern "dify-plugin-linux-amd64" --dir .scripts
          chmod +x .scripts/dify-plugin-linux-amd64
          mv .scripts/dify-plugin-linux-amd64 .scripts/dify

      - name: Validate Dependencies
        run: |
          cd "${{ matrix.plugin_path }}"

          if [ -f "uv.lock" ]; then
            VENV_DIR="$RUNNER_TEMP/plugin-dependency-check-venv"

            cleanup() {
              rm -rf "$VENV_DIR"
            }
            trap cleanup EXIT

            rm -rf "$VENV_DIR"
            UV_PROJECT_ENVIRONMENT="$VENV_DIR" uv sync --all-groups --frozen --python 3.12
          elif [ -f "requirements.txt" ]; then
            VENV_DIR=".ci-requirements-check-venv"

            cleanup() {
              rm -rf "$VENV_DIR"
            }
            trap cleanup EXIT

            rm -rf "$VENV_DIR"
            uv venv "$VENV_DIR" --python 3.12
            uv pip install --python "$VENV_DIR/bin/python" -r requirements.txt
          else
            echo "!!! uv.lock or requirements.txt is required for dependency validation"
            exit 1
          fi

      - name: Upload Plugin
        run: |
          uv run --with requests --with dify_plugin python .scripts/uploader/upload-package.py -d "${{ matrix.plugin_path }}" -t "${{ secrets.MARKETPLACE_TOKEN }}" --plugin-daemon-path .scripts/dify -u "${{ secrets.MARKETPLACE_BASE_URL }}" -f
